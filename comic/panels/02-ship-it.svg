<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <!-- Background -->
  <rect width="800" height="600" fill="#0b0f19"/>

  <!-- Maya's laptop (left) -->
  <rect x="80" y="350" width="200" height="140" fill="#111827" stroke="#34d399" stroke-width="2" rx="4"/>
  <rect x="90" y="360" width="180" height="120" fill="#0b0f19"/>
  <text x="100" y="380" font-size="10" fill="#60a5fa">git push origin main</text>
  <text x="100" y="395" font-size="10" fill="#34d399">✓ Build successful</text>
  <text x="100" y="410" font-size="10" fill="#34d399">✓ Tests passed</text>
  <text x="100" y="425" font-size="10" fill="#34d399">✓ Deployed to prod</text>
  <text x="100" y="450" font-size="10" fill="#fbbf24">5:00 PM Friday ✓</text>

  <!-- Code flowing (river metaphor) - stylized streams from laptop -->
  <path d="M 280 420 Q 350 380 420 400 Q 490 420 560 380" stroke="#60a5fa" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 280 430 Q 350 390 420 410 Q 490 430 560 390" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 280 440 Q 350 400 420 420 Q 490 440 560 400" stroke="#34d399" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Code tokens flowing -->
  <text x="310" y="410" font-size="11" fill="#a78bfa" opacity="0.8">{ state: "open" }</text>
  <text x="380" y="395" font-size="11" fill="#a78bfa" opacity="0.8">{ confirmed }</text>
  <text x="450" y="415" font-size="11" fill="#a78bfa" opacity="0.8">{ pending }</text>
  <text x="520" y="395" font-size="11" fill="#34d399" opacity="0.8">✓</text>

  <!-- Server tower (right) - glowing green -->
  <rect x="600" y="200" width="140" height="280" fill="#111827" stroke="#34d399" stroke-width="3" rx="6"/>
  <!-- Server lights -->
  <circle cx="620" cy="230" r="5" fill="#34d399"/>
  <circle cx="640" cy="230" r="5" fill="#34d399"/>
  <circle cx="660" cy="230" r="5" fill="#34d399"/>
  <circle cx="680" cy="230" r="5" fill="#fbbf24"/>
  <circle cx="700" cy="230" r="5" fill="#34d399"/>
  <circle cx="720" cy="230" r="5" fill="#34d399"/>
  <!-- Server panels -->
  <rect x="610" y="250" width="120" height="40" fill="#1e293b" rx="2"/>
  <text x="625" y="275" font-size="9" fill="#34d399">PROD-LIVE-01</text>
  <rect x="610" y="300" width="120" height="40" fill="#1e293b" rx="2"/>
  <text x="625" y="325" font-size="9" fill="#34d399">PROD-LIVE-02</text>
  <rect x="610" y="350" width="120" height="40" fill="#1e293b" rx="2"/>
  <text x="625" y="375" font-size="9" fill="#34d399">PROD-LIVE-03</text>
  <rect x="610" y="400" width="120" height="40" fill="#1e293b" rx="2"/>
  <text x="625" y="425" font-size="9" fill="#fbbf24">PROD-LIVE-04</text>
  <!-- Glow effect -->
  <circle cx="670" cy="350" r="80" fill="#34d399" opacity="0.1"/>

  <!-- Confetti particles -->
  <circle cx="350" cy="100" r="3" fill="#34d399"/>
  <circle cx="400" cy="80" r="2" fill="#60a5fa"/>
  <circle cx="450" cy="120" r="3" fill="#a78bfa"/>
  <circle cx="500" cy="90" r="2" fill="#34d399"/>
  <circle cx="380" cy="150" r="2" fill="#fbbf24"/>
  <circle cx="480" cy="160" r="3" fill="#60a5fa"/>
  <rect x="320" y="180" width="6" height="6" fill="#34d399" transform="rotate(45 323 183)"/>
  <rect x="420" y="200" width="6" height="6" fill="#a78bfa" transform="rotate(30 423 203)"/>
  <rect x="520" y="180" width="6" height="6" fill="#fbbf24" transform="rotate(60 523 183)"/>

  <!-- Big checkmark -->
  <circle cx="400" cy="280" r="35" fill="none" stroke="#34d399" stroke-width="4"/>
  <path d="M 385 280 L 397 292 L 420 268" stroke="#34d399" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Caption box -->
  <rect x="20" y="490" width="760" height="80" fill="#111827" stroke="#1e293b" stroke-width="1" rx="4"/>
  <text x="40" y="520" font-size="14" fill="#94a3b8">PANEL 02 — "SHIP IT"</text>
  <text x="40" y="545" font-size="13" fill="#e2e8f0">5:00 PM. Deploy complete. Maya goes home for the weekend.</text>
  <text x="40" y="562" font-size="12" fill="#60a5fa" font-style="italic">Maya: "Pushed to prod. See you Monday!"</text>
</svg>