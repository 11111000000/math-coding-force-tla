<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <!-- Background - red tinted for alarm -->
  <rect width="800" height="600" fill="#0b0f19"/>
  <rect width="800" height="300" fill="#1a0808" opacity="0.5"/>

  <!-- Top half: Phone notifications -->
  <text x="20" y="30" font-size="12" fill="#f87171" font-weight="bold">⚠ INCOMING ALERTS — 847 UNREAD</text>

  <!-- Notification 1 -->
  <rect x="20" y="50" width="370" height="50" fill="#1a0808" stroke="#f87171" stroke-width="1" rx="4"/>
  <circle cx="40" cy="75" r="10" fill="#f87171"/>
  <text x="35" y="80" font-size="12" fill="#fff" font-weight="bold">!</text>
  <text x="60" y="72" font-size="11" fill="#f8fafc" font-weight="bold">CHARGED TWICE</text>
  <text x="60" y="88" font-size="10" fill="#94a3b8">Order #4521 — $89.00 × 2 = $178.00</text>

  <!-- Notification 2 -->
  <rect x="20" y="110" width="370" height="50" fill="#1a0808" stroke="#f87171" stroke-width="1" rx="4"/>
  <circle cx="40" cy="135" r="10" fill="#f87171"/>
  <text x="35" y="140" font-size="12" fill="#fff" font-weight="bold">!</text>
  <text x="60" y="132" font-size="11" fill="#f8fafc" font-weight="bold">WHERE'S MY REFUND?</text>
  <text x="60" y="148" font-size="10" fill="#94a3b8">Customer support ticket #8823</text>

  <!-- Notification 3 -->
  <rect x="20" y="170" width="370" height="50" fill="#1a0808" stroke="#f87171" stroke-width="1" rx="4"/>
  <circle cx="40" cy="195" r="10" fill="#f87171"/>
  <text x="35" y="200" font-size="12" fill="#fff" font-weight="bold">!</text>
  <text x="60" y="192" font-size="11" fill="#f8fafc" font-weight="bold">I'M SWITCHING BANKS</text>
  <text x="60" y="208" font-size="10" fill="#94a3b8">@angry_user: worst experience ever</text>

  <!-- Notification 4 -->
  <rect x="20" y="230" width="370" height="50" fill="#1a0808" stroke="#f87171" stroke-width="1" rx="4"/>
  <circle cx="40" cy="255" r="10" fill="#f87171"/>
  <text x="35" y="260" font-size="12" fill="#fff" font-weight="bold">!</text>
  <text x="60" y="252" font-size="11" fill="#f8fafc" font-weight="bold">3X CHARGED</text>
  <text x="60" y="268" font-size="10" fill="#94a3b8">Order #4523 — $50.00 × 3</text>

  <!-- Right side: The Bug (the antagonist revealed) -->
  <rect x="410" y="50" width="370" height="230" fill="#111827" stroke="#f87171" stroke-width="2" rx="4"/>
  <text x="425" y="75" font-size="12" fill="#f87171" font-weight="bold">THE RACE CONDITION</text>

  <!-- Race condition diagram -->
  <!-- Click event line -->
  <line x1="430" y1="110" x2="760" y2="110" stroke="#60a5fa" stroke-width="2"/>
  <text x="430" y="105" font-size="10" fill="#60a5fa">onClick</text>
  <circle cx="450" cy="110" r="4" fill="#60a5fa"/>
  <circle cx="500" cy="110" r="4" fill="#60a5fa"/>
  <circle cx="550" cy="110" r="4" fill="#60a5fa"/>

  <!-- Async fetch line -->
  <line x1="430" y1="160" x2="760" y2="160" stroke="#a78bfa" stroke-width="2"/>
  <text x="430" y="155" font-size="10" fill="#a78bfa">fetch('/api/charge')</text>
  <circle cx="450" cy="160" r="4" fill="#a78bfa"/>
  <circle cx="580" cy="160" r="4" fill="#a78bfa"/>

  <!-- State update line -->
  <line x1="430" y1="210" x2="760" y2="210" stroke="#34d399" stroke-width="2"/>
  <text x="430" y="205" font-size="10" fill="#34d399">setState('confirming')</text>
  <circle cx="450" cy="210" r="4" fill="#34d399"/>
  <circle cx="700" cy="210" r="4" fill="#34d399"/>

  <!-- The BUG - red creature at intersection -->
  <g transform="translate(490, 145)">
    <!-- Bug body (sharp angular shape) -->
    <polygon points="0,0 -15,-20 -25,-5 -20,15 0,10 20,15 25,-5 15,-20" fill="#f87171" stroke="#7f1d1d" stroke-width="1"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-8" r="3" fill="#0b0f19"/>
    <circle cx="8" cy="-8" r="3" fill="#0b0f19"/>
    <circle cx="-7" cy="-8" r="1" fill="#fff"/>
    <circle cx="9" cy="-8" r="1" fill="#fff"/>
    <!-- Horns/spikes -->
    <polygon points="-15,-20 -20,-30 -10,-22" fill="#f87171"/>
    <polygon points="15,-20 20,-30 10,-22" fill="#f87171"/>
    <!-- Sharp teeth -->
    <path d="M -8 5 L -6 10 L -4 5 L -2 10 L 0 5 L 2 10 L 4 5 L 6 10 L 8 5 Z" fill="#7f1d1d"/>
  </g>

  <!-- Bug label -->
  <text x="490" y="180" font-size="11" fill="#f87171" font-weight="bold">BUG: race here</text>

  <!-- Bottom: Maya's panicked face -->
  <rect x="20" y="320" width="760" height="160" fill="#111827" stroke="#f87171" stroke-width="2" rx="4"/>

  <!-- Maya's face - large close-up -->
  <circle cx="180" cy="400" r="50" fill="#fbbf24"/>
  <!-- Hair (messy from stress) -->
  <path d="M 130 400 Q 135 360 180 355 Q 225 360 230 400 Q 230 380 215 370 L 200 360 L 185 365 L 170 360 L 155 365 L 140 370 Q 130 380 130 400 Z" fill="#1e293b"/>
  <!-- Wide panicked eyes -->
  <circle cx="165" cy="395" r="8" fill="#fff"/>
  <circle cx="195" cy="395" r="8" fill="#fff"/>
  <circle cx="167" cy="395" r="4" fill="#0b0f19"/>
  <circle cx="197" cy="395" r="4" fill="#0b0f19"/>
  <!-- Worried mouth -->
  <path d="M 165 420 Q 180 412 195 420" stroke="#0b0f19" stroke-width="2" fill="none"/>
  <!-- Sweat drop -->
  <ellipse cx="230" cy="370" rx="4" ry="8" fill="#60a5fa" opacity="0.7"/>

  <!-- Speech bubble -->
  <path d="M 280 360 L 460 360 L 480 380 L 470 395 L 460 380 L 280 380 Z" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
  <text x="295" y="378" font-size="11" fill="#f87171" font-weight="bold">HOW?!</text>

  <!-- Multiple browser tabs open behind her -->
  <rect x="450" y="340" width="320" height="20" fill="#1e293b" rx="3"/>
  <rect x="450" y="340" width="100" height="20" fill="#f87171" rx="3"/>
  <text x="460" y="354" font-size="9" fill="#fff">Errors: 847</text>
  <rect x="552" y="340" width="80" height="20" fill="#1e293b" rx="3"/>
  <text x="560" y="354" font-size="9" fill="#94a3b8">Stack trace</text>
  <rect x="634" y="340" width="80" height="20" fill="#1e293b" rx="3"/>
  <text x="642" y="354" font-size="9" fill="#94a3b8">Git blame</text>

  <!-- Browser window with error log -->
  <rect x="450" y="370" width="320" height="100" fill="#0b0f19" stroke="#1e293b" stroke-width="1"/>
  <text x="460" y="390" font-size="9" fill="#f87171">[14:23:45] Double charge detected</text>
  <text x="460" y="405" font-size="9" fill="#f87171">[14:23:46] Customer: order #4521</text>
  <text x="460" y="420" font-size="9" fill="#f87171">[14:23:47] Double charge detected</text>
  <text x="460" y="435" font-size="9" fill="#f87171">[14:23:48] Customer: order #4522</text>
  <text x="460" y="450" font-size="9" fill="#fbbf24">[14:24:01] CHARGE_BACK_THRESHOLD</text>
  <text x="460" y="465" font-size="9" fill="#fbbf24">[14:24:02] PagerDuty alert fired</text>

  <!-- Caption -->
  <rect x="20" y="490" width="760" height="80" fill="#111827" stroke="#f87171" stroke-width="1" rx="4"/>
  <text x="40" y="520" font-size="14" fill="#f87171">PANEL 04 — "THE BUG"</text>
  <text x="40" y="545" font-size="13" fill="#e2e8f0">Monday morning. 847 users were double-charged over the weekend.</text>
  <text x="40" y="562" font-size="12" fill="#60a5fa" font-style="italic">Maya: "How?! The tests passed. The code review was clean. WHERE did this come from?"</text>
</svg>