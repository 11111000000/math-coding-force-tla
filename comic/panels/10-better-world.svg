<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <!-- Background - night sky, peaceful -->
  <rect width="800" height="600" fill="#0b0f19"/>

  <!-- Stars in the sky -->
  <circle cx="80" cy="60" r="1" fill="#fbbf24" opacity="0.7"/>
  <circle cx="150" cy="40" r="1" fill="#f8fafc"/>
  <circle cx="220" cy="80" r="1.5" fill="#fbbf24"/>
  <circle cx="320" cy="50" r="1" fill="#f8fafc"/>
  <circle cx="480" cy="70" r="1" fill="#fbbf24" opacity="0.7"/>
  <circle cx="600" cy="40" r="1.5" fill="#f8fafc"/>
  <circle cx="700" cy="90" r="1" fill="#fbbf24"/>
  <circle cx="750" cy="50" r="1" fill="#f8fafc"/>

  <!-- Moon -->
  <circle cx="720" cy="70" r="20" fill="#fbbf24" opacity="0.4"/>
  <circle cx="715" cy="65" r="18" fill="#0b0f19"/>

  <!-- State machine constellation in the sky -->
  <g opacity="0.9">
    <!-- Connecting lines (constellation) -->
    <line x1="200" y1="150" x2="300" y2="120" stroke="#34d399" stroke-width="1" opacity="0.6"/>
    <line x1="300" y1="120" x2="400" y2="140" stroke="#34d399" stroke-width="1" opacity="0.6"/>
    <line x1="400" y1="140" x2="500" y2="120" stroke="#34d399" stroke-width="1" opacity="0.6"/>
    <line x1="500" y1="120" x2="600" y2="150" stroke="#34d399" stroke-width="1" opacity="0.6"/>
    <line x1="600" y1="150" x2="500" y2="200" stroke="#34d399" stroke-width="1" opacity="0.6"/>
    <line x1="500" y1="200" x2="400" y2="180" stroke="#34d399" stroke-width="1" opacity="0.6"/>
    <line x1="400" y1="180" x2="300" y2="200" stroke="#34d399" stroke-width="1" opacity="0.6"/>
    <line x1="300" y1="200" x2="200" y2="150" stroke="#34d399" stroke-width="1" opacity="0.6"/>

    <!-- Star nodes -->
    <circle cx="200" cy="150" r="4" fill="#34d399"/>
    <circle cx="200" cy="150" r="8" fill="#34d399" opacity="0.3"/>
    <text x="200" y="135" font-size="9" fill="#34d399" text-anchor="middle">closed</text>

    <circle cx="300" cy="120" r="4" fill="#34d399"/>
    <circle cx="300" cy="120" r="8" fill="#34d399" opacity="0.3"/>
    <text x="300" y="105" font-size="9" fill="#34d399" text-anchor="middle">opening</text>

    <circle cx="400" cy="140" r="5" fill="#34d399"/>
    <circle cx="400" cy="140" r="10" fill="#34d399" opacity="0.3"/>
    <text x="400" y="125" font-size="9" fill="#34d399" text-anchor="middle">open</text>

    <circle cx="500" cy="120" r="4" fill="#a78bfa"/>
    <circle cx="500" cy="120" r="8" fill="#a78bfa" opacity="0.3"/>
    <text x="500" y="105" font-size="9" fill="#a78bfa" text-anchor="middle">confirming</text>

    <circle cx="600" cy="150" r="4" fill="#34d399"/>
    <circle cx="600" cy="150" r="8" fill="#34d399" opacity="0.3"/>
    <text x="600" y="135" font-size="9" fill="#34d399" text-anchor="middle">closing</text>

    <circle cx="500" cy="200" r="4" fill="#fbbf24"/>
    <circle cx="500" cy="200" r="8" fill="#fbbf24" opacity="0.3"/>
    <text x="500" y="218" font-size="9" fill="#fbbf24" text-anchor="middle">canceling</text>

    <circle cx="400" cy="180" r="4" fill="#34d399"/>
    <circle cx="400" cy="180" r="8" fill="#34d399" opacity="0.3"/>
    <text x="400" y="200" font-size="9" fill="#34d399" text-anchor="middle">done</text>

    <circle cx="300" cy="200" r="4" fill="#34d399"/>
    <circle cx="300" cy="200" r="8" fill="#34d399" opacity="0.3"/>
    <text x="300" y="218" font-size="9" fill="#34d399" text-anchor="middle">error</text>
  </g>

  <!-- Stats overlay (top left) -->
  <g transform="translate(40, 240)">
    <rect x="0" y="0" width="200" height="80" fill="#111827" stroke="#34d399" stroke-width="1" rx="4"/>
    <text x="10" y="18" font-size="10" fill="#34d399" font-weight="bold">3 MONTHS LATER</text>
    <text x="10" y="35" font-size="10" fill="#f8fafc">Zero incidents</text>
    <text x="10" y="50" font-size="10" fill="#f8fafc">12 features shipped</text>
    <text x="10" y="65" font-size="10" fill="#f8fafc">47 verified packets</text>
  </g>

  <!-- Users around the world (top right) -->
  <g transform="translate(560, 240)">
    <rect x="0" y="0" width="200" height="100" fill="#111827" stroke="#34d399" stroke-width="1" rx="4"/>
    <text x="10" y="18" font-size="10" fill="#34d399" font-weight="bold">USERS WORLDWIDE</text>
    <!-- User avatars -->
    <circle cx="30" cy="45" r="12" fill="#fbbf24"/>
    <circle cx="30" cy="45" r="8" fill="#34d399"/>
    <path d="M 22 45 L 28 51 L 38 41" stroke="#fff" stroke-width="2" fill="none"/>

    <circle cx="70" cy="45" r="12" fill="#a78bfa"/>
    <circle cx="70" cy="45" r="8" fill="#34d399"/>
    <path d="M 62 45 L 68 51 L 78 41" stroke="#fff" stroke-width="2" fill="none"/>

    <circle cx="110" cy="45" r="12" fill="#60a5fa"/>
    <circle cx="110" cy="45" r="8" fill="#34d399"/>
    <path d="M 102 45 L 108 51 L 118 41" stroke="#fff" stroke-width="2" fill="none"/>

    <circle cx="150" cy="45" r="12" fill="#fbbf24"/>
    <circle cx="150" cy="45" r="8" fill="#34d399"/>
    <path d="M 142 45 L 148 51 L 158 41" stroke="#fff" stroke-width="2" fill="none"/>

    <text x="100" y="80" font-size="9" fill="#34d399" text-anchor="middle">happy users everywhere</text>
  </g>

  <!-- The Team at desks (bottom) -->
  <g transform="translate(0, 380)">
    <!-- Floor line -->
    <line x1="0" y1="0" x2="800" y2="0" stroke="#1e293b" stroke-width="2"/>

    <!-- Maya's desk (center) -->
    <rect x="280" y="20" width="240" height="80" fill="#1e293b" rx="2"/>
    <!-- Maya figure (looking up at sky, satisfied) -->
    <g transform="translate(400, 0)">
      <!-- Body -->
      <rect x="-25" y="-40" width="50" height="60" fill="#3b82f6" rx="10"/>
      <!-- Head (looking up) -->
      <circle cx="0" cy="-60" r="18" fill="#fbbf24"/>
      <!-- Hair -->
      <path d="M -18 -60 Q -15 -78 0 -80 Q 15 -78 18 -60 Q 18 -68 10 -72 Q 0 -74 -10 -72 Q -18 -68 -18 -60 Z" fill="#1e293b"/>
      <!-- Eyes (looking up, peaceful) -->
      <ellipse cx="-6" cy="-62" rx="2" ry="3" fill="#0b0f19"/>
      <ellipse cx="6" cy="-62" rx="2" ry="3" fill="#0b0f19"/>
      <!-- Smile -->
      <path d="M -5 -52 Q 0 -48 5 -52" stroke="#0b0f19" stroke-width="1" fill="none"/>
    </g>
    <!-- Laptop on Maya's desk -->
    <rect x="320" y="40" width="80" height="50" fill="#0b0f19" stroke="#34d399" stroke-width="1" rx="2"/>
    <text x="360" y="60" font-size="7" fill="#34d399" text-anchor="middle">✓ green</text>
    <text x="360" y="75" font-size="7" fill="#34d399" text-anchor="middle">lights</text>

    <!-- Formalist's desk (left) -->
    <rect x="40" y="20" width="180" height="80" fill="#1e293b" rx="2"/>
    <g transform="translate(130, 0)">
      <rect x="-20" y="-40" width="40" height="60" fill="#a78bfa" rx="10"/>
      <circle cx="0" cy="-60" r="15" fill="#f4d4a8"/>
      <path d="M -15 -60 Q -10 -75 0 -77 Q 10 -75 15 -60 Q 15 -68 0 -70 Q -15 -68 -15 -60 Z" fill="#94a3b8"/>
      <circle cx="-5" cy="-62" r="3" fill="none" stroke="#0b0f19" stroke-width="1"/>
      <circle cx="5" cy="-62" r="3" fill="none" stroke="#0b0f19" stroke-width="1"/>
      <line x1="-2" y1="-62" x2="2" y2="-62" stroke="#0b0f19" stroke-width="1"/>
    </g>
    <rect x="60" y="40" width="80" height="50" fill="#0b0f19" stroke="#34d399" stroke-width="1" rx="2"/>
    <text x="100" y="60" font-size="7" fill="#34d399" text-anchor="middle">reviewing</text>
    <text x="100" y="75" font-size="7" fill="#34d399" text-anchor="middle">packet</text>

    <!-- Other devs (right) -->
    <rect x="580" y="20" width="180" height="80" fill="#1e293b" rx="2"/>
    <g transform="translate(620, 0)">
      <rect x="-15" y="-40" width="30" height="60" fill="#fbbf24" rx="8"/>
      <circle cx="0" cy="-55" r="13" fill="#fbbf24"/>
      <path d="M -13 -55 Q -10 -68 0 -70 Q 10 -68 13 -55 Q 13 -62 0 -64 Q -13 -62 -13 -55 Z" fill="#1e293b"/>
    </g>
    <g transform="translate(680, 0)">
      <rect x="-15" y="-40" width="30" height="60" fill="#60a5fa" rx="8"/>
      <circle cx="0" cy="-55" r="13" fill="#a78bfa"/>
      <path d="M -13 -55 Q -10 -68 0 -70 Q 10 -68 13 -55 Q 13 -62 0 -64 Q -13 -62 -13 -55 Z" fill="#1e293b"/>
    </g>
    <rect x="600" y="40" width="60" height="50" fill="#0b0f19" stroke="#34d399" stroke-width="1" rx="2"/>
    <text x="630" y="60" font-size="7" fill="#34d399" text-anchor="middle">typing</text>
    <rect x="670" y="40" width="60" height="50" fill="#0b0f19" stroke="#34d399" stroke-width="1" rx="2"/>
    <text x="700" y="60" font-size="7" fill="#34d399" text-anchor="middle">typing</text>
  </g>

  <!-- Maya's small speech bubble -->
  <path d="M 380 350 L 460 350 L 460 370 L 380 370 L 370 380 L 375 370 L 360 370 Z" fill="#111827" stroke="#34d399" stroke-width="1"/>
  <text x="395" y="365" font-size="10" fill="#34d399" font-style="italic">We don't ship</text>

  <!-- Code glow effect (subtle blue grid overlay) -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#60a5fa" stroke-width="0.5"/>
  </g>

  <!-- Caption -->
  <rect x="20" y="490" width="760" height="80" fill="#111827" stroke="#1e293b" stroke-width="1" rx="4"/>
  <text x="40" y="520" font-size="14" fill="#34d399">PANEL 10 — "THE WORLD, IMPROVED"</text>
  <text x="40" y="545" font-size="12" fill="#e2e8f0">Three months later. Zero incidents. Twelve features shipped. Forty-seven verified packets.</text>
  <text x="40" y="562" font-size="11" fill="#94a3b8" font-style="italic">The team builds calmly. The users trust the system. The code does what it says.</text>
</svg>