<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <!-- Background -->
  <rect width="800" height="600" fill="#0b0f19"/>

  <!-- Maya's desk - two monitors -->
  <!-- Left monitor: TLA+ model -->
  <rect x="40" y="80" width="340" height="240" fill="#111827" stroke="#a78bfa" stroke-width="2" rx="4"/>
  <rect x="50" y="90" width="320" height="220" fill="#0b0f19"/>
  <text x="60" y="110" font-size="9" fill="#94a3b8">Model.tla</text>
  <line x1="50" y1="115" x2="370" y2="115" stroke="#a78bfa" stroke-width="1"/>

  <!-- TLA+ code -->
  <text x="60" y="135" font-size="11" fill="#a78bfa" font-weight="bold">VARIABLES</text>
  <text x="130" y="135" font-size="11" fill="#f8fafc">state, pendingResult</text>

  <text x="60" y="160" font-size="11" fill="#a78bfa" font-weight="bold">Init</text>
  <text x="100" y="160" font-size="11" fill="#94a3b8">==</text>
  <text x="70" y="175" font-size="11" fill="#94a3b8">/\</text>
  <text x="85" y="175" font-size="11" fill="#f8fafc">state =</text>
  <text x="135" y="175" font-size="11" fill="#34d399">"closed"</text>

  <text x="60" y="200" font-size="11" fill="#a78bfa" font-weight="bold">Open</text>
  <text x="100" y="200" font-size="11" fill="#94a3b8">==</text>
  <text x="70" y="215" font-size="11" fill="#94a3b8">/\</text>
  <text x="85" y="215" font-size="11" fill="#f8fafc">state =</text>
  <text x="135" y="215" font-size="11" fill="#34d399">"closed"</text>
  <text x="70" y="230" font-size="11" fill="#94a3b8">/\</text>
  <text x="85" y="230" font-size="11" fill="#f8fafc">state' =</text>
  <text x="145" y="230" font-size="11" fill="#34d399">"opening"</text>

  <text x="60" y="255" font-size="11" fill="#a78bfa" font-weight="bold">Confirm</text>
  <text x="125" y="255" font-size="11" fill="#94a3b8">==</text>
  <text x="70" y="270" font-size="11" fill="#94a3b8">/\</text>
  <text x="85" y="270" font-size="11" fill="#f8fafc">state =</text>
  <text x="135" y="270" font-size="11" fill="#34d399">"open"</text>
  <text x="70" y="285" font-size="11" fill="#94a3b8">/\</text>
  <text x="85" y="285" font-size="11" fill="#f8fafc">state' =</text>
  <text x="145" y="285" font-size="11" fill="#34d399">"confirming"</text>

  <text x="60" y="305" font-size="10" fill="#94a3b8" font-style="italic">// ... 10 actions total</text>

  <!-- Right monitor: State diagram -->
  <rect x="420" y="80" width="340" height="240" fill="#111827" stroke="#60a5fa" stroke-width="2" rx="4"/>
  <rect x="430" y="90" width="320" height="220" fill="#0b0f19"/>
  <text x="440" y="110" font-size="9" fill="#94a3b8">State Diagram</text>
  <line x1="430" y1="115" x2="750" y2="115" stroke="#60a5fa" stroke-width="1"/>

  <!-- State nodes (circular diagram) -->
  <!-- Center node -->
  <circle cx="590" cy="200" r="25" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <text x="590" y="205" font-size="10" fill="#60a5fa" text-anchor="middle">open</text>

  <!-- Surrounding nodes -->
  <!-- closed (left) -->
  <circle cx="470" cy="200" r="20" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="470" y="205" font-size="9" fill="#94a3b8" text-anchor="middle">closed</text>

  <!-- opening (top-left) -->
  <circle cx="510" cy="140" r="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="510" y="144" font-size="9" fill="#fbbf24" text-anchor="middle">opening</text>

  <!-- confirming (top-right) -->
  <circle cx="670" cy="140" r="20" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="670" y="144" font-size="9" fill="#a78bfa" text-anchor="middle">confirming</text>

  <!-- closing (bottom-right) -->
  <circle cx="670" cy="260" r="18" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="670" y="264" font-size="9" fill="#94a3b8" text-anchor="middle">closing</text>

  <!-- canceling (bottom-left) -->
  <circle cx="510" cy="260" r="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="510" y="264" font-size="9" fill="#fbbf24" text-anchor="middle">canceling</text>

  <!-- Arrows -->
  <line x1="490" y1="200" x2="565" y2="200" stroke="#60a5fa" stroke-width="1"/>
  <polygon points="565,200 558,197 558,203" fill="#60a5fa"/>
  <line x1="510" y1="158" x2="528" y2="180" stroke="#60a5fa" stroke-width="1"/>
  <polygon points="528,180 522,175 526,182" fill="#60a5fa"/>
  <line x1="650" y1="158" x2="612" y2="180" stroke="#60a5fa" stroke-width="1"/>
  <polygon points="612,180 615,173 619,180" fill="#60a5fa"/>

  <!-- Maya focused at desk -->
  <g transform="translate(330, 360)">
    <!-- Body -->
    <rect x="-30" y="0" width="60" height="80" fill="#3b82f6" rx="15"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="25" fill="#fbbf24"/>
    <!-- Hair -->
    <path d="M -25 -30 Q -20 -55 0 -60 Q 20 -55 25 -30 Q 25 -42 15 -48 Q 0 -52 -15 -48 Q -25 -42 -25 -30 Z" fill="#1e293b"/>
    <!-- Eyes focused (looking at screen) -->
    <rect x="-12" y="-33" width="6" height="6" fill="#0b0f19"/>
    <rect x="6" y="-33" width="6" height="6" fill="#0b0f19"/>
    <!-- Concentrated mouth -->
    <line x1="-6" y1="-20" x2="6" y2="-20" stroke="#0b0f19" stroke-width="1.5"/>
    <!-- Purple glow on face -->
    <ellipse cx="0" cy="-30" rx="35" ry="20" fill="#a78bfa" opacity="0.15"/>
  </g>

  <!-- Coffee cup -->
  <ellipse cx="430" cy="430" rx="12" ry="5" fill="#1e293b"/>
  <path d="M 422 425 Q 422 415 430 415 Q 438 415 438 425 Z" fill="#fbbf24"/>
  <ellipse cx="430" cy="415" rx="8" ry="2" fill="#1e293b"/>

  <!-- Thinking bubble -->
  <g transform="translate(500, 380)">
    <circle cx="0" cy="0" r="30" fill="#111827" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="-25" cy="20" r="5" fill="#111827" stroke="#a78bfa" stroke-width="1"/>
    <text x="0" y="-3" font-size="9" fill="#a78bfa" text-anchor="middle">If confirming,</text>
    <text x="0" y="8" font-size="9" fill="#a78bfa" text-anchor="middle">user can't</text>
    <text x="0" y="19" font-size="9" fill="#a78bfa" text-anchor="middle">click again...</text>
  </g>

  <!-- Caption -->
  <rect x="20" y="490" width="760" height="80" fill="#111827" stroke="#1e293b" stroke-width="1" rx="4"/>
  <text x="40" y="520" font-size="14" fill="#94a3b8">PANEL 07 — "THE MODEL"</text>
  <text x="40" y="545" font-size="13" fill="#e2e8f0">Maya writes 47 lines of TLA+. The model is small. The states are clear.</text>
  <text x="40" y="562" font-size="12" fill="#a78bfa" font-style="italic">Maya: "If 'confirming' is the state, then the user can't click again... right?"</text>
</svg>