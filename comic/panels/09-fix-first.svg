<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <!-- Background - triumphant green -->
  <rect width="800" height="600" fill="#0b0f19"/>

  <!-- Maya's desk - two monitors -->
  <!-- Left monitor: TypeScript implementation -->
  <rect x="40" y="80" width="340" height="240" fill="#111827" stroke="#60a5fa" stroke-width="2" rx="4"/>
  <rect x="50" y="90" width="320" height="220" fill="#0b0f19"/>
  <text x="60" y="110" font-size="9" fill="#94a3b8">dialogReducer.ts</text>
  <line x1="50" y1="115" x2="370" y2="115" stroke="#60a5fa" stroke-width="1"/>

  <!-- TypeScript code matching the verified model -->
  <text x="60" y="135" font-size="10" fill="#a78bfa">export function</text>
  <text x="160" y="135" font-size="10" fill="#60a5fa">dialogReducer</text>
  <text x="240" y="135" font-size="10" fill="#94a3b8">(</text>

  <text x="70" y="155" font-size="10" fill="#f8fafc">state:</text>
  <text x="115" y="155" font-size="10" fill="#fbbf24">DialogStateShape</text>
  <text x="60" y="170" font-size="10" fill="#94a3b8">) {</text>

  <text x="70" y="190" font-size="10" fill="#a78bfa">switch</text>
  <text x="115" y="190" font-size="10" fill="#94a3b8">(action.type) {</text>

  <text x="80" y="210" font-size="10" fill="#a78bfa">case</text>
  <text x="120" y="210" font-size="10" fill="#34d399">"CONFIRM"</text>
  <text x="195" y="210" font-size="10" fill="#94a3b8">:</text>

  <text x="90" y="225" font-size="10" fill="#a78bfa">if</text>
  <text x="110" y="225" font-size="10" fill="#94a3b8">(state.state !==</text>
  <text x="215" y="225" font-size="10" fill="#34d399">"open"</text>
  <text x="260" y="225" font-size="10" fill="#94a3b8">)</text>
  <text x="270" y="225" font-size="10" fill="#a78bfa">return</text>
  <text x="320" y="225" font-size="10" fill="#f8fafc">state;</text>

  <text x="90" y="245" font-size="10" fill="#a78bfa">return</text>
  <text x="135" y="245" font-size="10" fill="#94a3b8">{ state:</text>
  <text x="190" y="245" font-size="10" fill="#34d399">"confirming"</text>
  <text x="265" y="245" font-size="10" fill="#94a3b8">...</text>

  <text x="80" y="265" font-size="10" fill="#94a3b8">}</text>
  <text x="70" y="285" font-size="10" fill="#94a3b8">}</text>

  <text x="60" y="305" font-size="10" fill="#34d399">// matches Model.tla exactly ✓</text>

  <!-- Right monitor: Fixed state diagram -->
  <rect x="420" y="80" width="340" height="240" fill="#111827" stroke="#34d399" stroke-width="2" rx="4"/>
  <rect x="430" y="90" width="320" height="220" fill="#0b0f19"/>
  <text x="440" y="110" font-size="9" fill="#94a3b8">State Diagram (FIXED)</text>
  <line x1="430" y1="115" x2="750" y2="115" stroke="#34d399" stroke-width="1"/>

  <!-- State nodes - now clean -->
  <circle cx="590" cy="200" r="25" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="590" y="205" font-size="10" fill="#34d399" text-anchor="middle">open</text>

  <circle cx="470" cy="200" r="20" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="470" y="205" font-size="9" fill="#34d399" text-anchor="middle">closed</text>

  <circle cx="510" cy="140" r="18" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="510" y="144" font-size="9" fill="#34d399" text-anchor="middle">opening</text>

  <circle cx="670" cy="140" r="20" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="670" y="144" font-size="9" fill="#34d399" text-anchor="middle">confirming</text>

  <circle cx="670" cy="260" r="18" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="670" y="264" font-size="9" fill="#34d399" text-anchor="middle">closing</text>

  <circle cx="510" cy="260" r="18" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="510" y="264" font-size="9" fill="#34d399" text-anchor="middle">canceling</text>

  <!-- Arrows (all green now) -->
  <line x1="490" y1="200" x2="565" y2="200" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="565,200 558,197 558,203" fill="#34d399"/>
  <line x1="510" y1="158" x2="528" y2="180" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="528,180 522,175 526,182" fill="#34d399"/>
  <line x1="650" y1="158" x2="612" y2="180" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="612,180 615,173 619,180" fill="#34d399"/>

  <!-- The bug path is now BLOCKED - red wall -->
  <rect x="595" y="160" width="6" height="20" fill="#f87171" stroke="#7f1d1d" stroke-width="1"/>
  <text x="598" y="173" font-size="12" fill="#fff" font-weight="bold">×</text>
  <!-- Block label -->
  <text x="610" y="155" font-size="8" fill="#f87171">BLOCKED</text>

  <!-- Maya pointing at screen, triumphant -->
  <g transform="translate(350, 360)">
    <!-- Body -->
    <rect x="-30" y="0" width="60" height="80" fill="#3b82f6" rx="15"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="25" fill="#fbbf24"/>
    <!-- Hair -->
    <path d="M -25 -30 Q -20 -55 0 -60 Q 20 -55 25 -30 Q 25 -42 15 -48 Q 0 -52 -15 -48 Q -25 -42 -25 -30 Z" fill="#1e293b"/>
    <!-- Eyes (excited) -->
    <ellipse cx="-9" cy="-32" rx="3" ry="4" fill="#0b0f19"/>
    <ellipse cx="9" cy="-32" rx="3" ry="4" fill="#0b0f19"/>
    <!-- Big smile -->
    <path d="M -8 -18 Q 0 -10 8 -18" stroke="#0b0f19" stroke-width="2" fill="none"/>
    <!-- Arm pointing at screen -->
    <line x1="20" y1="-10" x2="50" y2="-30" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <!-- Finger pointing -->
    <line x1="50" y1="-30" x2="60" y2="-40" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Bug trapped in a box (bottom right) -->
  <g transform="translate(650, 420)">
    <!-- Box -->
    <rect x="-20" y="-15" width="40" height="30" fill="none" stroke="#f87171" stroke-width="2"/>
    <text x="-15" y="-5" font-size="8" fill="#f87171">BUG</text>
    <!-- Tiny bug inside -->
    <polygon points="0,0 -5,-8 -8,-2 -6,5 0,3 6,5 8,-2 5,-8" fill="#f87171" opacity="0.5"/>
    <!-- Box label -->
    <text x="0" y="25" font-size="7" fill="#94a3b8" text-anchor="middle">FIXED IN MODEL</text>
  </g>

  <!-- Code review checkmark (small figure) -->
  <g transform="translate(60, 420)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M -7 0 L -2 5 L 7 -5" stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="0" y="30" font-size="8" fill="#34d399" text-anchor="middle">code review ✓</text>
  </g>

  <!-- Clock -->
  <g transform="translate(700, 360)">
    <circle cx="0" cy="0" r="18" fill="#111827" stroke="#1e293b" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="8" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="0" cy="0" r="1.5" fill="#fbbf24"/>
    <text x="0" y="30" font-size="7" fill="#94a3b8" text-anchor="middle">11:47 AM</text>
  </g>

  <!-- Speech bubble from Maya -->
  <path d="M 430 380 L 580 380 L 580 400 L 450 400 L 440 410 L 445 400 L 430 400 Z" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="445" y="396" font-size="11" fill="#34d399">If the model is right, and</text>

  <!-- Caption -->
  <rect x="20" y="490" width="760" height="80" fill="#111827" stroke="#1e293b" stroke-width="1" rx="4"/>
  <text x="40" y="520" font-size="14" fill="#34d399">PANEL 09 — "FIX FIRST, THEN CODE"</text>
  <text x="40" y="545" font-size="13" fill="#e2e8f0">The fix happens in the model first. Then the code follows the model. Then tests verify the code matches the model.</text>
  <text x="40" y="562" font-size="12" fill="#34d399" font-style="italic">Maya: "If the model is right, and the code matches the model, then the code is right."</text>
</svg>