<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <rect width="100" height="100" fill="transparent"/>
  <!-- Bridge from formal to code -->
  <rect x="15" y="35" width="30" height="30" fill="none" stroke="#a78bfa" stroke-width="2" rx="2"/>
  <text x="30" y="55" font-size="8" fill="#a78bfa" text-anchor="middle" font-family="monospace">TLA+</text>
  <rect x="55" y="35" width="30" height="30" fill="none" stroke="#60a5fa" stroke-width="2" rx="2"/>
  <text x="70" y="55" font-size="8" fill="#60a5fa" text-anchor="middle" font-family="monospace">Code</text>
  <!-- Bridge -->
  <path d="M 45 50 Q 50 35 55 50" stroke="#34d399" stroke-width="2" fill="none"/>
  <line x1="48" y1="42" x2="52" y2="42" stroke="#34d399" stroke-width="1"/>
  <line x1="49" y1="38" x2="51" y2="38" stroke="#34d399" stroke-width="1"/>
  <!-- Arrow direction -->
  <polygon points="55,50 51,47 51,53" fill="#34d399"/>
  <!-- Below -->
  <text x="50" y="80" font-size="7" fill="#34d399" text-anchor="middle" font-family="monospace">refinement</text>
</svg>