<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <rect width="100" height="100" fill="transparent"/>
  <!-- Formal symbols: /\ and [] -->
  <text x="50" y="35" font-size="20" fill="#60a5fa" text-anchor="middle" font-family="monospace" font-weight="bold">[]</text>
  <text x="50" y="55" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="monospace">/\</text>
  <text x="50" y="73" font-size="14" fill="#34d399" text-anchor="middle" font-family="monospace">~></text>
  <line x1="20" y1="85" x2="80" y2="85" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <text x="50" y="95" font-size="8" fill="#60a5fa" text-anchor="middle" font-family="monospace">Spec</text>
</svg>