<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <rect width="100" height="100" fill="transparent"/>
  <!-- Fractal spiral -->
  <g stroke="#a78bfa" stroke-width="1.5" fill="none">
    <path d="M 50 50 L 50 20 L 70 20 L 70 50"/>
    <path d="M 70 50 L 70 70 L 50 70"/>
    <path d="M 50 70 L 30 70 L 30 50"/>
    <path d="M 30 50 L 30 30 L 50 30"/>
    <!-- Smaller recursive -->
    <path d="M 50 30 L 50 25 L 55 25 L 55 30" stroke-width="1"/>
    <path d="M 50 20 L 50 15 L 55 15" stroke-width="1"/>
    <path d="M 70 50 L 75 50" stroke-width="1"/>
    <path d="M 70 70 L 75 70" stroke-width="1"/>
  </g>
  <circle cx="50" cy="50" r="3" fill="#a78bfa"/>
</svg>