<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <rect width="100" height="100" fill="transparent"/>
  <!-- Traceability: model nodes connected to code nodes -->
  <circle cx="25" cy="35" r="5" fill="#a78bfa"/>
  <circle cx="25" cy="55" r="5" fill="#a78bfa"/>
  <circle cx="25" cy="75" r="5" fill="#a78bfa"/>
  <circle cx="75" cy="35" r="5" fill="#60a5fa"/>
  <circle cx="75" cy="55" r="5" fill="#60a5fa"/>
