  <line x1="30" y1="35" x2="70" y2="35" stroke="#34d399" stroke-width="1.5"/>
  <line x1="30" y1="55" x2="70" y2="55" stroke="#34d399" stroke-width="1.5"/>
  <line x1="30" y1="75" x2="70" y2="75" stroke="#34d399" stroke-width="1.5"/>
