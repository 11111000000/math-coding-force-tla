<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <rect width="100" height="100" fill="transparent"/>
  <!-- Traceability map -->
  <!-- Model side -->
  <circle cx="25" cy="30" r="6" fill="#a78bfa"/>
  <circle cx="25" cy="50" r="6" fill="#a78bfa"/>
  <circle cx="25" cy="70" r="6" fill="#a78bfa"/>
  <text x="25" y="90" font-size="7" fill="#a78bfa" text-anchor="middle" font-family="monospace">Model</text>

  <!-- Code side -->
  <circle cx="75" cy="30" r="6" fill="#60a5fa"/>
  <circle cx="75" cy="50" r="6" fill="#60a5fa"/>
  <circle cx="75" cy="70" r="6" fill="#60a5fa"/>
  <text x="75" y="90" font-size="7" fill="#60a5fa" text-anchor="middle" font-family="monospace">Code</text>

  <!-- Trace lines -->
  <line x1="31" y1="30" x2="69" y2="30" stroke="#34d399" stroke-width="1.5"/>
  <line x1="31" y1="50" x2="69" y2="50" stroke="#34d399" stroke-width="1.5"/>
  <line x1="31" y1="70" x2="69" y2="70" stroke="#34d399" stroke-width="1.5"/>

  <!-- Connection points -->
  <circle cx="50" cy="30" r="2" fill="#34d399"/>
  <circle cx="50" cy="50" r="2" fill="#34d399"/>
  <circle cx="50" cy="70" r="2" fill="#34d399"/>
</svg>