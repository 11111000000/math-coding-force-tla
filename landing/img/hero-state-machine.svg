<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <!-- Background -->
  <rect width="600" height="400" fill="transparent"/>

  <!-- Large state machine constellation -->
  <g transform="translate(300, 200)">
    <!-- Connecting lines (constellation) -->
    <g opacity="0.6">
      <line x1="-180" y1="-40" x2="-90" y2="-80" stroke="#34d399" stroke-width="1.5"/>
      <line x1="-90" y1="-80" x2="20" y2="-60" stroke="#34d399" stroke-width="1.5"/>
      <line x1="20" y1="-60" x2="120" y2="-100" stroke="#34d399" stroke-width="1.5"/>
      <line x1="120" y1="-100" x2="200" y2="-40" stroke="#34d399" stroke-width="1.5"/>
      <line x1="200" y1="-40" x2="120" y2="40" stroke="#34d399" stroke-width="1.5"/>
      <line x1="120" y1="40" x2="20" y2="20" stroke="#34d399" stroke-width="1.5"/>
      <line x1="20" y1="20" x2="-90" y2="40" stroke="#34d399" stroke-width="1.5"/>
      <line x1="-90" y1="40" x2="-180" y2="-40" stroke="#34d399" stroke-width="1.5"/>
      <line x1="-180" y1="-40" x2="-180" y2="100" stroke="#34d399" stroke-width="1.5"/>
      <line x1="-180" y1="100" x2="-90" y2="40" stroke="#34d399" stroke-width="1.5"/>
      <line x1="20" y1="20" x2="120" y2="100" stroke="#34d399" stroke-width="1.5"/>
      <line x1="120" y1="100" x2="200" y2="40" stroke="#34d399" stroke-width="1.5"/>
    </g>

    <!-- Nodes with glow -->
    <circle cx="-180" cy="-40" r="6" fill="#34d399"/>
    <circle cx="-180" cy="-40" r="14" fill="#34d399" opacity="0.2"/>

    <circle cx="-90" cy="-80" r="5" fill="#60a5fa"/>
    <circle cx="-90" cy="-80" r="12" fill="#60a5fa" opacity="0.2"/>

    <circle cx="20" cy="-60" r="8" fill="#60a5fa"/>
    <circle cx="20" cy="-60" r="18" fill="#60a5fa" opacity="0.25"/>

    <circle cx="120" cy="-100" r="5" fill="#a78bfa"/>
    <circle cx="120" cy="-100" r="12" fill="#a78bfa" opacity="0.2"/>

    <circle cx="200" cy="-40" r="5" fill="#fbbf24"/>
    <circle cx="200" cy="-40" r="12" fill="#fbbf24" opacity="0.2"/>

    <circle cx="120" cy="40" r="5" fill="#34d399"/>
    <circle cx="120" cy="40" r="12" fill="#34d399" opacity="0.2"/>

    <circle cx="20" cy="20" r="6" fill="#34d399"/>
    <circle cx="20" cy="20" r="14" fill="#34d399" opacity="0.2"/>

    <circle cx="-90" cy="40" r="5" fill="#fbbf24"/>
    <circle cx="-90" cy="40" r="12" fill="#fbbf24" opacity="0.2"/>

    <circle cx="-180" cy="100" r="5" fill="#f87171"/>
    <circle cx="-180" cy="100" r="12" fill="#f87171" opacity="0.2"/>

    <circle cx="120" cy="100" r="5" fill="#34d399"/>
    <circle cx="120" cy="100" r="12" fill="#34d399" opacity="0.2"/>
  </g>

  <!-- Central crystal -->
  <g transform="translate(300, 200)">
    <polygon points="0,-30 -25,-15 -30,10 -15,25 15,25 30,10 25,-15" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="1.5"/>
    <polygon points="0,-30 -25,-15 0,0 25,-15" fill="#34d399" opacity="0.3"/>
    <polygon points="-25,-15 -30,10 0,0" fill="#34d399" opacity="0.2"/>
    <polygon points="25,-15 30,10 0,0" fill="#34d399" opacity="0.2"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#34d399"/>
  </g>

  <!-- Floating math symbols (subtle) -->
  <text x="50" y="60" font-size="14" fill="#a78bfa" opacity="0.4">∀</text>
  <text x="540" y="80" font-size="14" fill="#a78bfa" opacity="0.4">∃</text>
  <text x="80" y="350" font-size="14" fill="#a78bfa" opacity="0.4">∈</text>
  <text x="520" y="340" font-size="14" fill="#a78bfa" opacity="0.4">→</text>
  <text x="480" y="50" font-size="14" fill="#60a5fa" opacity="0.4">∧</text>
  <text x="120" y="370" font-size="14" fill="#60a5fa" opacity="0.4">∨</text>

  <!-- Math symbols floating (small code fragments) -->
  <g opacity="0.5">
    <text x="30" y="150" font-size="10" fill="#60a5fa" font-style="italic">state = "open"</text>
    <text x="430" y="180" font-size="10" fill="#a78bfa" font-style="italic">state' = "confirming"</text>
    <text x="60" y="280" font-size="10" fill="#60a5fa" font-style="italic">/\ pending = "in-flight"</text>
    <text x="400" y="290" font-size="10" fill="#34d399" font-style="italic">✓ invariant</text>
  </g>

  <!-- Stars/particles -->
  <circle cx="80" cy="100" r="1" fill="#fbbf24"/>
  <circle cx="150" cy="60" r="1" fill="#f8fafc"/>
  <circle cx="500" cy="120" r="1" fill="#fbbf24"/>
  <circle cx="560" cy="200" r="1" fill="#f8fafc"/>
  <circle cx="100" cy="200" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="540" cy="300" r="1" fill="#f8fafc"/>
</svg>