<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <rect width="100" height="100" fill="transparent"/>
  <!-- Code brackets with curly braces -->
  <text x="30" y="55" font-size="32" fill="#60a5fa" font-family="monospace">{</text>
  <text x="70" y="55" font-size="32" fill="#60a5fa" font-family="monospace">}</text>
  <line x1="40" y1="40" x2="60" y2="40" stroke="#34d399" stroke-width="2"/>
  <line x1="40" y1="50" x2="55" y2="50" stroke="#34d399" stroke-width="2"/>
  <line x1="40" y1="60" x2="60" y2="60" stroke="#34d399" stroke-width="2"/>
</svg>