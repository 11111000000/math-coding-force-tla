<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <rect width="100" height="100" fill="transparent"/>
  <!-- Dialog box (modal) -->
  <rect x="20" y="25" width="60" height="50" fill="none" stroke="#34d399" stroke-width="2" rx="4"/>
  <text x="50" y="15" font-size="7" fill="#34d399" text-anchor="middle" font-family="monospace">Dialog</text>
  <!-- Header line -->
  <line x1="20" y1="38" x2="80" y2="38" stroke="#34d399" stroke-width="1"/>
  <!-- Buttons -->
  <rect x="28" y="55" width="18" height="10" fill="#34d399" opacity="0.4" rx="2"/>
  <text x="37" y="63" font-size="6" fill="#34d399" text-anchor="middle" font-family="monospace">OK</text>
  <rect x="54" y="55" width="18" height="10" fill="#94a3b8" opacity="0.4" rx="2"/>
  <text x="63" y="63" font-size="6" fill="#94a3b8" text-anchor="middle" font-family="monospace">Cancel</text>
  <!-- States around -->
  <circle cx="15" cy="50" r="5" fill="#60a5fa"/>
  <circle cx="85" cy="50" r="5" fill="#fbbf24"/>
  <circle cx="50" cy="85" r="5" fill="#a78bfa"/>
  <!-- Verification check -->
  <circle cx="88" cy="18" r="8" fill="#34d399"/>
  <path d="M 84 18 L 87 21 L 92 15" stroke="#0b0f19" stroke-width="2" fill="none"/>
</svg>