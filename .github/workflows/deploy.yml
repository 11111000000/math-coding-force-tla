name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Copy comic panels into docs
        run: |
          mkdir -p MathCodingBase/assets/comic-panels/v1
          mkdir -p MathCodingBase/assets/comic-panels/v2
          mkdir -p MathCodingBase/assets/comic-panels/v3
          cp -r comic/panels/*.svg MathCodingBase/assets/comic-panels/v1/
          cp -r artifacts/comic-v2/implementation/*.svg MathCodingBase/assets/comic-panels/v2/
          cp -r artifacts/comic-v3/implementation/*.svg MathCodingBase/assets/comic-panels/v3/

      - name: Build docs
        run: mkdocs build --strict

      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp -r site/docs/* _site/docs/
          cp Landing/index.html _site/index.html
          mkdir -p _site/img
          cp -r landing/img/* _site/img/
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=/math-coding/docs/Index/"></head><body></body></html>' > _site/docs/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
