  <text x="586" y="260" font-size="18" fill="#3b82f6">const onConfirm = () =&gt; {</text>
  <text x="586" y="284" font-size="18" fill="#3b82f6">  setState('confirming');</text>
  <text x="586" y="308" font-size="18" fill="#ef4444">  api.confirm()  // race</text>
  <text x="586" y="332" font-size="18" fill="#3b82f6">};</text>
  <text x="586" y="364" font-size="16" fill="#ef4444">// 13 states. 8 distinct.</text>
  <text x="586" y="386" font-size="16" fill="#ef4444">// StateInvariant violated.</text>
  <text x="586" y="416" font-size="16" fill="#ef4444">// WHY?</text>
