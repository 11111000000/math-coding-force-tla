<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect fill="#0d1117" width="800" height="600"/>

  <line x1="0" y1="490" x2="800" y2="490" stroke="#1e293b" stroke-width="1"/>

  <rect x="40" y="120" width="320" height="220" fill="#111827" stroke="#22c55e" stroke-width="2" rx="6"/>
  <rect x="50" y="130" width="300" height="200" fill="#0d1117"/>
  <text x="56" y="148" font-size="9" fill="#94a3b8">// Verified model -> Code</text>
  <text x="56" y="164" font-size="9" fill="#22c55e">type DialogState =</text>
  <text x="56" y="178" font-size="9" fill="#22c55e">  | "closed" | "opening"</text>
  <text x="56" y="192" font-size="9" fill="#22c55e">  | "open" | "confirming"</text>
  <text x="56" y="206" font-size="9" fill="#22c55e">  | "canceling" | "closing"</text>
  <text x="56" y="220" font-size="9" fill="#22c55e">  | "error";</text>
  <text x="56" y="240" font-size="9" fill="#cbd5e1">function reduce(state, action) {</text>
  <text x="56" y="254" font-size="9" fill="#cbd5e1">  switch (action.type) {</text>
  <text x="56" y="268" font-size="9" fill="#22c55e">    case "OPEN":</text>
  <text x="56" y="282" font-size="9" fill="#22c55e">      return "opening";</text>
  <text x="56" y="302" font-size="9" fill="#ef4444">  // no "confirming" + "closed"</text>
  <text x="56" y="316" font-size="9" fill="#ef4444">  // StateInvariant enforced</text>
  <text x="56" y="320" font-size="9" fill="#cbd5e1">  }</text>
  <rect x="32" y="338" width="336" height="8" fill="#1e293b" rx="2"/>

  <rect x="440" y="120" width="320" height="220" fill="#111827" stroke="#22c55e" stroke-width="2" rx="6"/>
  <rect x="450" y="130" width="300" height="200" fill="#0d1117"/>
  <g>
    <circle cx="490" cy="170" r="14" fill="#22c55e"/>
    <text x="490" y="174" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">closed</text>
    <circle cx="600" cy="170" r="14" fill="#22c55e"/>
    <text x="600" y="174" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">open</text>
    <circle cx="710" cy="170" r="14" fill="#22c55e"/>
    <text x="710" y="174" font-size="7" fill="#0d1117" text-anchor="middle" font-weight="bold">conf</text>
    <circle cx="600" cy="270" r="14" fill="#22c55e"/>
    <text x="600" y="274" font-size="7" fill="#0d1117" text-anchor="middle" font-weight="bold">settle</text>
    <circle cx="490" cy="270" r="14" fill="#22c55e"/>
    <text x="490" y="274" font-size="7" fill="#0d1117" text-anchor="middle" font-weight="bold">cancel</text>

    <line x1="504" y1="170" x2="586" y2="170" stroke="#22c55e" stroke-width="2"/>
    <line x1="614" y1="170" x2="696" y2="170" stroke="#22c55e" stroke-width="2"/>
    <line x1="600" y1="184" x2="600" y2="256" stroke="#22c55e" stroke-width="2"/>
    <line x1="490" y1="184" x2="490" y2="256" stroke="#22c55e" stroke-width="2"/>
    <line x1="586" y1="270" x2="504" y2="270" stroke="#22c55e" stroke-width="2"/>
  </g>
  <line x1="490" y1="170" x2="710" y2="170" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2" opacity="0.5"/>
  <text x="600" y="320" font-size="9" fill="#ef4444" text-anchor="middle" font-style="italic">closed→confirming path blocked</text>
  <rect x="432" y="338" width="336" height="8" fill="#1e293b" rx="2"/>

  <g transform="translate(180 420)" data-maya="present">
    <ellipse cx="0" cy="100" rx="80" ry="15" fill="#0d1117" opacity="0.6"/>
    <path d="M -28 30 L -28 90 L 28 90 L 28 30 Z" fill="#475569"/>
    <path d="M -28 30 Q -32 10 -18 5 L 18 5 Q 32 10 28 30 Z" fill="#1e293b"/>
    <path d="M 28 0 L 100 -30" stroke="#c8a882" stroke-width="12" fill="none" stroke-linecap="round"/>
    <ellipse cx="105" cy="-32" rx="7" ry="6" fill="#c8a882"/>
    <path d="M -28 30 L -50 90" stroke="#c8a882" stroke-width="12" fill="none" stroke-linecap="round"/>

    <circle cx="0" cy="-15" r="22" fill="#c8a882"/>
    <path d="M -22 -28 Q -22 -48 0 -50 Q 22 -48 22 -28 L 22 -15 L -22 -15 Z" fill="#1e1b1b"/>
    <ellipse cx="-8" cy="-15" rx="2.5" ry="3" fill="#0d0807"/>
    <ellipse cx="8" cy="-15" rx="2.5" ry="3" fill="#0d0807"/>
    <ellipse cx="-10" cy="-16" rx="4" ry="2" fill="#86efac" opacity="0.7"/>
    <ellipse cx="6" cy="-16" rx="4" ry="2" fill="#86efac" opacity="0.7"/>
    <path d="M -10 -30 L -4 -28" stroke="#1e1b1b" stroke-width="2"/>
    <path d="M 4 -28 L 10 -30" stroke="#1e1b1b" stroke-width="2"/>
    <path d="M -6 -2 Q 0 4 6 -2" stroke="#1e1b1b" stroke-width="1.5" fill="none"/>
  </g>

  <g transform="translate(540 460)">
    <rect x="-30" y="-20" width="60" height="40" fill="#1a0808" stroke="#ef4444" stroke-width="2" rx="4"/>
    <text y="-2" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">FIXED</text>
    <text y="12" font-size="7" fill="#ef4444" text-anchor="middle">IN MODEL</text>
    <path d="M -20 14 L 0 -10 L 20 14 Z" fill="#ef4444" opacity="0.6" stroke="#7f1d1d" stroke-width="0.5"/>
    <circle cx="-4" cy="2" r="1" fill="#0d1117"/>
    <circle cx="4" cy="2" r="1" fill="#0d1117"/>
  </g>

  <g transform="translate(700 480)">
    <circle r="20" fill="#22c55e"/>
    <path d="M -8 0 L -2 6 L 8 -6" stroke="#0d1117" stroke-width="3" fill="none"/>
    <text y="35" font-size="9" fill="#22c55e" text-anchor="middle" font-weight="bold">VERIFIED</text>
  </g>

  <text x="400" y="40" font-size="24" fill="#22c55e" text-anchor="middle" font-weight="bold">Fix First, Then Code</text>
  <text x="400" y="560" font-size="13" fill="#cbd5e1" text-anchor="middle">The fix happens in the model first. Then the code follows the model.</text>
  <text x="400" y="582" font-size="13" fill="#f59e0b" text-anchor="middle" font-style="italic">"If the model is right, and the code matches the model, then the code is right."</text>
</svg>