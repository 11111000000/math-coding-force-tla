<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Background -->
  <rect fill="#0d1117" width="1000" height="800"/>

  <!-- Title -->
  <text x="500" y="40" font-size="32" fill="#22c55e" text-anchor="middle" font-weight="bold">TLC Finds It</text>

  <!-- Constellation ACTIVE in the background -->
  <g opacity="0.55">
    <line x1="80"  y1="120" x2="220" y2="80"  stroke="#22c55e" stroke-width="2"/>
    <line x1="220" y1="80"  x2="380" y2="130" stroke="#22c55e" stroke-width="2"/>
    <line x1="380" y1="130" x2="540" y2="100" stroke="#22c55e" stroke-width="2"/>
    <line x1="540" y1="100" x2="700" y2="160" stroke="#22c55e" stroke-width="2"/>
    <line x1="700" y1="160" x2="900" y2="120" stroke="#22c55e" stroke-width="2"/>
    <line x1="80"  y1="120" x2="160" y2="260" stroke="#22c55e" stroke-width="2"/>
    <line x1="160" y1="260" x2="380" y2="130" stroke="#22c55e" stroke-width="2"/>
    <line x1="380" y1="130" x2="320" y2="300" stroke="#22c55e" stroke-width="2"/>

    <circle cx="80"  cy="120" r="12" fill="#22c55e"/>
    <circle cx="220" cy="80"  r="12" fill="#22c55e"/>
    <circle cx="380" cy="130" r="12" fill="#22c55e"/>
    <circle cx="540" cy="100" r="12" fill="#22c55e"/>
    <circle cx="700" cy="160" r="12" fill="#22c55e"/>
    <circle cx="900" cy="120" r="12" fill="#22c55e"/>
    <circle cx="160" cy="260" r="12" fill="#22c55e"/>
    <circle cx="320" cy="300" r="12" fill="#22c55e"/>
  </g>

  <!-- TLC Crystal Computer at CENTER (large faceted octagon) -->
  <g transform="translate(500,420)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="180" fill="#22c55e" opacity="0.06"/>
    <circle cx="0" cy="0" r="130" fill="#22c55e" opacity="0.10"/>
    <!-- Octagon -->
    <polygon points="-100,-30 -30,-100 30,-100 100,-30 100,30 30,100 -30,100 -100,30"
             fill="#22c55e" stroke="#166534" stroke-width="3"/>
    <!-- Facet lines -->
    <line x1="-100" y1="-30" x2="30"  y2="-100" stroke="#166534" stroke-width="2"/>
    <line x1="-30"  y1="-100" x2="100" y2="-30"  stroke="#166534" stroke-width="2"/>
    <line x1="100"  y1="-30"  x2="30"  y2="100"  stroke="#166534" stroke-width="2"/>
    <line x1="30"   y1="100"  x2="-100" y2="30"  stroke="#166534" stroke-width="2"/>
    <line x1="-100" y1="30"   x2="-30"  y2="-100" stroke="#166534" stroke-width="2"/>
    <line x1="100"  y1="-30"  x2="-30"  y2="-100" stroke="#86efac" stroke-width="1" opacity="0.7"/>
    <line x1="30"   y1="-100" x2="-100" y2="30"  stroke="#86efac" stroke-width="1" opacity="0.7"/>
    <!-- Center label -->
    <text x="0" y="-5" font-size="14" fill="#0d1117" text-anchor="middle" font-weight="bold">TLC</text>
    <text x="0" y="14" font-size="9" fill="#0d1117" text-anchor="middle">CHECK</text>

    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.25"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- Green beam scanning from TLC toward bug (upper-left toward Maya's code region) -->
  <polygon points="500,420 200,200 220,220" fill="#22c55e" opacity="0.18"/>

  <!-- Maya's code region (upper-left, what beam illuminates) -->
  <rect x="80" y="160" width="280" height="180" fill="#111827" stroke="#22c55e" stroke-width="2" rx="4"/>
  <rect x="80" y="160" width="280" height="180" fill="#22c55e" opacity="0.05" rx="4"/>
  <text x="92" y="184" font-size="11" fill="#a855f7">VARIABLES state, pending</text>
  <text x="92" y="200" font-size="11" fill="#22c55e">Init == /\ state = "closed"</text>
  <text x="92" y="216" font-size="11" fill="#22c55e">Confirm ==</text>
  <text x="92" y="232" font-size="11" fill="#22c55e">  /\ state&apos; = "confirming"</text>
  <text x="92" y="248" font-size="11" fill="#22c55e">Resolve ==</text>
  <text x="92" y="264" font-size="11" fill="#22c55e">  /\ state&apos; = "closing"</text>
  <text x="92" y="280" font-size="11" fill="#ef4444" font-weight="bold">StateInvariant == </text>
  <text x="92" y="296" font-size="11" fill="#ef4444">  state \in States</text>
  <text x="92" y="316" font-size="11" fill="#cbd5e1">// wait...</text>

  <!-- Bug REVEALED in green spotlight -->
  <g transform="translate(220, 220)">
    <!-- Spotlight cone -->
    <polygon points="0,0 -80,80 80,80" fill="#22c55e" opacity="0.18"/>
    <!-- The bug, illuminated, caught -->
    <polygon points="-40,30 40,30 0,-30" fill="#ef4444" stroke="#7f1d1d" stroke-width="3"/>
    <circle cx="-15" cy="5" r="4" fill="#0d1117"/>
    <circle cx="15" cy="5" r="4" fill="#0d1117"/>
    <!-- Label -->
    <text x="0" y="50" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">VIOLATION</text>
  </g>

  <!-- Big violation label at top of panel -->
  <g transform="translate(500, 100)">
    <rect x="-220" y="-26" width="440" height="52" fill="#1f1717" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="0" y="6" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold">StateInvariant violated</text>
  </g>

  <!-- Maya in lower-left control panel, hand raised -->
  <g transform="translate(120, 620)">
    <rect x="0" y="0" width="200" height="120" fill="#111827" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="100" y="24" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="bold">CONTROL PANEL</text>
    <!-- Mini Maya -->
    <g data-maya="present" transform="translate(40, 50)">
      <rect x="0" y="0" width="40" height="80" fill="#94a3b8" rx="8"/>
      <circle cx="20" cy="0" r="15" fill="#cbd5e1"/>
      <!-- Hand raised: small rect above head -->
      <rect x="14" y="-30" width="12" height="22" fill="#94a3b8" rx="3"/>
    </g>
  </g>

  <!-- The Formalist beside Maya -->
  <g>
    <rect x="350" y="600" width="50" height="100" fill="#475569" rx="10"/>
    <circle cx="375" cy="600" r="18" fill="#94a3b8"/>
    <circle cx="368" cy="600" r="4" fill="#0d1117" stroke="#cbd5e1" stroke-width="1"/>
    <circle cx="382" cy="600" r="4" fill="#0d1117" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="372" y1="600" x2="378" y2="600" stroke="#cbd5e1" stroke-width="1"/>
  </g>

  <!-- Red flashing bug node in the constellation -->
  <g>
    <circle cx="320" cy="300" r="14" fill="#ef4444"/>
    <circle cx="320" cy="300" r="20" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <text x="320" y="304" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">BUG</text>
  </g>

  <!-- TLC stats -->
  <g transform="translate(760, 200)">
    <rect x="0" y="0" width="180" height="80" fill="#111827" stroke="#22c55e" stroke-width="2" rx="4"/>
    <text x="90" y="20" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="bold">TLC Stats</text>
    <text x="10" y="40" font-size="10" fill="#cbd5e1">states generated: 13</text>
    <text x="10" y="54" font-size="10" fill="#cbd5e1">distinct: 8</text>
    <text x="10" y="68" font-size="10" fill="#22c55e">violation found: 1</text>
  </g>

  <!-- Caption -->
  <text x="500" y="780" font-size="16" fill="#cbd5e1" text-anchor="middle">8 distinct states. Then TLC finds what no test could.</text>
</svg>
