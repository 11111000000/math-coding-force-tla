<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Background -->
  <rect fill="#0d1117" width="800" height="600"/>

  <!-- Friday sun: amber window in upper-left corner -->
  <rect x="40" y="40" width="220" height="160" fill="#111827" stroke="#1e293b" stroke-width="2" rx="4"/>
  <rect x="40" y="40" width="220" height="160" fill="#f59e0b" opacity="0.12" rx="4"/>
  <!-- Sun disc -->
  <circle cx="200" cy="110" r="28" fill="#f59e0b" opacity="0.6"/>
  <!-- City silhouette inside window -->
  <rect x="60"  y="160" width="18" height="40" fill="#1e293b"/>
  <rect x="82"  y="140" width="22" height="60" fill="#1e293b"/>
  <rect x="108" y="150" width="16" height="50" fill="#1e293b"/>
  <rect x="128" y="130" width="24" height="70" fill="#1e293b"/>
  <rect x="156" y="155" width="18" height="45" fill="#1e293b"/>
  <rect x="178" y="145" width="20" height="55" fill="#1e293b"/>
  <rect x="202" y="160" width="14" height="40" fill="#1e293b"/>
  <rect x="220" y="150" width="20" height="50" fill="#1e293b"/>

  <!-- Desk surface -->
  <line x1="0" y1="470" x2="800" y2="470" stroke="#1e293b" stroke-width="1"/>

  <!-- Laptop on desk -->
  <rect x="450" y="330" width="220" height="140" fill="#111827" stroke="#1e293b" stroke-width="2" rx="4"/>
  <!-- Laptop screen content: TS confirm dialog -->
  <rect x="462" y="342" width="196" height="116" fill="#0d1117"/>
  <text x="468" y="358" font-size="10" fill="#3b82f6">const onConfirm = () =&gt; {</text>
  <text x="468" y="372" font-size="10" fill="#3b82f6">  setState('confirming');</text>
  <text x="468" y="386" font-size="10" fill="#3b82f6">  api.confirm().then(() =&gt; {</text>
  <text x="468" y="400" font-size="10" fill="#3b82f6">    setState('closing');</text>
  <text x="468" y="414" font-size="10" fill="#3b82f6">  });</text>
  <text x="468" y="428" font-size="10" fill="#3b82f6">};</text>
  <text x="468" y="450" font-size="10" fill="#94a3b8">// tests pass. ship it.</text>
  <!-- Laptop base -->
  <rect x="440" y="468" width="240" height="8" fill="#1e293b" rx="2"/>

  <!-- Maya at desk -->
  <g data-maya="present">
    <rect x="320" y="290" width="40" height="80" fill="#94a3b8" rx="8"/>
    <circle cx="340" cy="290" r="15" fill="#cbd5e1"/>
  </g>
  <!-- Maya's coffee cup -->
  <rect x="380" y="360" width="22" height="30" fill="#1e293b" stroke="#3b82f6" stroke-width="1" rx="2"/>
  <ellipse cx="391" cy="362" rx="10" ry="3" fill="#3b82f6" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="40" font-size="24" fill="#3b82f6" text-anchor="middle" font-weight="bold">Looks Right</text>

  <!-- Caption -->
  <text x="400" y="555" font-size="14" fill="#cbd5e1" text-anchor="middle">Friday afternoon. Maya needs to ship a payment confirmation dialog.</text>
  <text x="400" y="575" font-size="14" fill="#f59e0b" text-anchor="middle" font-style="italic">"This should work. The tests pass. The code looks right."</text>
</svg>
