<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Background -->
  <rect fill="#0d1117" width="800" height="600"/>

  <!-- Title -->
  <text x="400" y="40" font-size="24" fill="#22c55e" text-anchor="middle" font-weight="bold">Fix First, Then Code</text>

  <!-- Desk surface -->
  <line x1="0" y1="490" x2="800" y2="490" stroke="#1e293b" stroke-width="1"/>

  <!-- LEFT monitor: TypeScript that matches the verified model -->
  <rect x="40" y="100" width="300" height="200" fill="#111827" stroke="#22c55e" stroke-width="2" rx="6"/>
  <rect x="50" y="110" width="280" height="180" fill="#0d1117"/>
  <rect x="50" y="110" width="280" height="180" fill="#22c55e" opacity="0.04"/>
  <text x="56" y="130" font-size="10" fill="#94a3b8">// matches Model.tla</text>
  <text x="56" y="148" font-size="10" fill="#3b82f6">type DialogState =</text>
  <text x="56" y="162" font-size="10" fill="#3b82f6">  | "closed" | "open"</text>
  <text x="56" y="176" font-size="10" fill="#3b82f6">  | "confirming" | "settle"</text>
  <text x="56" y="190" font-size="10" fill="#3b82f6">  | "canceling" | "error";</text>
  <text x="56" y="212" font-size="10" fill="#22c55e">function reduce(s, a):</text>
  <text x="56" y="226" font-size="10" fill="#22c55e">  switch (a.type) {</text>
  <text x="56" y="240" font-size="10" fill="#22c55e">    case "OPEN":</text>
  <text x="56" y="254" font-size="10" fill="#22c55e">      return "open"</text>
  <text x="56" y="268" font-size="10" fill="#22c55e">      // narrowing: </text>
  <text x="56" y="282" font-size="10" fill="#22c55e">      // cannot click</text>

  <!-- RIGHT monitor: clean state diagram, all paths green -->
  <rect x="380" y="100" width="380" height="200" fill="#111827" stroke="#22c55e" stroke-width="2" rx="6"/>
  <rect x="390" y="110" width="360" height="180" fill="#0d1117"/>
  <g>
    <circle cx="430" cy="160" r="14" fill="#22c55e"/>
    <text x="430" y="164" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">closed</text>

    <circle cx="540" cy="160" r="14" fill="#22c55e"/>
    <text x="540" y="164" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">open</text>

    <circle cx="650" cy="160" r="14" fill="#22c55e"/>
    <text x="650" y="164" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">conf</text>

    <circle cx="540" cy="240" r="14" fill="#22c55e"/>
    <text x="540" y="244" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">settle</text>

    <circle cx="430" cy="240" r="14" fill="#22c55e"/>
    <text x="430" y="244" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">cancel</text>

    <line x1="444" y1="160" x2="526" y2="160" stroke="#22c55e" stroke-width="2"/>
    <line x1="554" y1="160" x2="636" y2="160" stroke="#22c55e" stroke-width="2"/>
    <line x1="540" y1="174" x2="540" y2="226" stroke="#22c55e" stroke-width="2"/>
    <line x1="526" y1="240" x2="444" y2="240" stroke="#22c55e" stroke-width="2"/>

    <text x="485" y="185" font-size="9" fill="#22c55e" text-anchor="middle">Open</text>
    <text x="595" y="185" font-size="9" fill="#22c55e" text-anchor="middle">Confirm</text>
    <text x="560" y="210" font-size="9" fill="#22c55e">Resolve</text>
    <text x="485" y="270" font-size="9" fill="#22c55e" text-anchor="middle">FinishClose</text>
  </g>

  <!-- Maya triumphant, pointing at the diagram -->
  <g data-maya="present">
    <rect x="370" y="320" width="40" height="80" fill="#94a3b8" rx="8"/>
    <circle cx="390" cy="320" r="15" fill="#cbd5e1"/>
    <!-- Pointing arm -->
    <rect x="395" y="345" width="40" height="10" fill="#94a3b8" rx="3"/>
    <circle cx="438" cy="350" r="5" fill="#cbd5e1"/>
  </g>

  <!-- Bug-creature TRAPPED in FIXED IN MODEL box -->
  <g transform="translate(120, 380)">
    <rect x="0" y="0" width="160" height="80" fill="#1f1717" stroke="#ef4444" stroke-width="2" rx="4"/>
    <text x="80" y="20" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="bold">FIXED IN MODEL</text>
    <!-- Trapped bug, smaller, behind bars -->
    <polygon points="65,55 95,55 80,38" fill="#ef4444" opacity="0.7"/>
    <circle cx="73" cy="48" r="2" fill="#0d1117"/>
    <circle cx="87" cy="48" r="2" fill="#0d1117"/>
    <!-- Cage bars -->
    <line x1="40" y1="30" x2="40" y2="78" stroke="#475569" stroke-width="2"/>
    <line x1="120" y1="30" x2="120" y2="78" stroke="#475569" stroke-width="2"/>
  </g>

  <!-- VERIFIED stamp -->
  <g transform="translate(620, 480) rotate(-8)">
    <rect x="-60" y="-22" width="120" height="44" fill="#22c55e" stroke="#166534" stroke-width="3" rx="4"/>
    <text x="0" y="6" font-size="18" fill="#0d1117" text-anchor="middle" font-weight="bold">VERIFIED</text>
  </g>

  <!-- Verdict label -->
  <text x="400" y="540" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="bold">verdict: VERIFIED — code matches the model</text>
  <text x="400" y="565" font-size="14" fill="#f59e0b" text-anchor="middle" font-style="italic">"If the model is right, and the code matches the model, then the code is right."</text>
</svg>