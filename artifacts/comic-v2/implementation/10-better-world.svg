<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Background -->
  <rect fill="#0d1117" width="800" height="600"/>

  <!-- Title -->
  <text x="400" y="40" font-size="24" fill="#22c55e" text-anchor="middle" font-weight="bold">Better World</text>

  <!-- MIDDLE: state machine as IMMENSE constellation across the sky -->
  <g opacity="0.85">
    <!-- Connecting lines -->
    <line x1="100" y1="180" x2="220" y2="140" stroke="#22c55e" stroke-width="2"/>
    <line x1="220" y1="140" x2="350" y2="190" stroke="#22c55e" stroke-width="2"/>
    <line x1="350" y1="190" x2="480" y2="150" stroke="#22c55e" stroke-width="2"/>
    <line x1="480" y1="150" x2="610" y2="200" stroke="#22c55e" stroke-width="2"/>
    <line x1="610" y1="200" x2="730" y2="160" stroke="#22c55e" stroke-width="2"/>
    <line x1="100" y1="180" x2="180" y2="280" stroke="#22c55e" stroke-width="2"/>
    <line x1="180" y1="280" x2="350" y2="190" stroke="#22c55e" stroke-width="2"/>
    <line x1="350" y1="190" x2="320" y2="300" stroke="#22c55e" stroke-width="2"/>
    <line x1="480" y1="150" x2="540" y2="290" stroke="#22c55e" stroke-width="2"/>
    <line x1="610" y1="200" x2="700" y2="290" stroke="#22c55e" stroke-width="2"/>
    <line x1="320" y1="300" x2="540" y2="290" stroke="#22c55e" stroke-width="2"/>
    <line x1="540" y1="290" x2="700" y2="290" stroke="#22c55e" stroke-width="2"/>

    <!-- Nodes -->
    <circle cx="100" cy="180" r="9" fill="#22c55e"/>
    <circle cx="220" cy="140" r="9" fill="#22c55e"/>
    <circle cx="350" cy="190" r="9" fill="#22c55e"/>
    <circle cx="480" cy="150" r="9" fill="#22c55e"/>
    <circle cx="610" cy="200" r="9" fill="#22c55e"/>
    <circle cx="730" cy="160" r="9" fill="#22c55e"/>
    <circle cx="180" cy="280" r="9" fill="#22c55e"/>
    <circle cx="320" cy="300" r="9" fill="#22c55e"/>
    <circle cx="540" cy="290" r="9" fill="#22c55e"/>
    <circle cx="700" cy="290" r="9" fill="#22c55e"/>

    <!-- Tiny stars -->
    <circle cx="60"  cy="100" r="1" fill="#cbd5e1"/>
    <circle cx="280" cy="80"  r="1" fill="#cbd5e1"/>
    <circle cx="420" cy="60"  r="1" fill="#cbd5e1"/>
    <circle cx="580" cy="100" r="1" fill="#cbd5e1"/>
    <circle cx="740" cy="80"  r="1" fill="#cbd5e1"/>
    <circle cx="150" cy="220" r="1" fill="#cbd5e1"/>
    <circle cx="640" cy="240" r="1" fill="#cbd5e1"/>
  </g>

  <!-- TOP: diverse users as small icons with curved smile lines, clicking confirm -->
  <g>
    <!-- User 1 -->
    <g transform="translate(60, 60)">
      <circle cx="0" cy="0" r="8" fill="#cbd5e1"/>
      <rect x="-5" y="8" width="10" height="14" fill="#94a3b8"/>
      <path d="M -3 -2 Q 0 1 3 -2" stroke="#22c55e" stroke-width="1.5" fill="none"/>
      <g transform="translate(15, 5)">
        <path d="M -3 0 L -1 2 L 4 -3" stroke="#22c55e" stroke-width="2" fill="none"/>
      </g>
    </g>

    <!-- User 2 -->
    <g transform="translate(180, 50)">
      <circle cx="0" cy="0" r="8" fill="#cbd5e1"/>
      <rect x="-5" y="8" width="10" height="14" fill="#94a3b8"/>
      <path d="M -3 -2 Q 0 1 3 -2" stroke="#22c55e" stroke-width="1.5" fill="none"/>
      <g transform="translate(15, 5)">
        <path d="M -3 0 L -1 2 L 4 -3" stroke="#22c55e" stroke-width="2" fill="none"/>
      </g>
    </g>

    <!-- User 3 -->
    <g transform="translate(300, 60)">
      <circle cx="0" cy="0" r="8" fill="#cbd5e1"/>
      <rect x="-5" y="8" width="10" height="14" fill="#94a3b8"/>
      <path d="M -3 -2 Q 0 1 3 -2" stroke="#22c55e" stroke-width="1.5" fill="none"/>
      <g transform="translate(15, 5)">
        <path d="M -3 0 L -1 2 L 4 -3" stroke="#22c55e" stroke-width="2" fill="none"/>
      </g>
    </g>

    <!-- User 4 -->
    <g transform="translate(420, 50)">
      <circle cx="0" cy="0" r="8" fill="#cbd5e1"/>
      <rect x="-5" y="8" width="10" height="14" fill="#94a3b8"/>
      <path d="M -3 -2 Q 0 1 3 -2" stroke="#22c55e" stroke-width="1.5" fill="none"/>
      <g transform="translate(15, 5)">
        <path d="M -3 0 L -1 2 L 4 -3" stroke="#22c55e" stroke-width="2" fill="none"/>
      </g>
    </g>

    <!-- User 5 -->
    <g transform="translate(540, 60)">
      <circle cx="0" cy="0" r="8" fill="#cbd5e1"/>
      <rect x="-5" y="8" width="10" height="14" fill="#94a3b8"/>
      <path d="M -3 -2 Q 0 1 3 -2" stroke="#22c55e" stroke-width="1.5" fill="none"/>
      <g transform="translate(15, 5)">
        <path d="M -3 0 L -1 2 L 4 -3" stroke="#22c55e" stroke-width="2" fill="none"/>
      </g>
    </g>

    <!-- User 6 -->
    <g transform="translate(660, 50)">
      <circle cx="0" cy="0" r="8" fill="#cbd5e1"/>
      <rect x="-5" y="8" width="10" height="14" fill="#94a3b8"/>
      <path d="M -3 -2 Q 0 1 3 -2" stroke="#22c55e" stroke-width="1.5" fill="none"/>
      <g transform="translate(15, 5)">
        <path d="M -3 0 L -1 2 L 4 -3" stroke="#22c55e" stroke-width="2" fill="none"/>
      </g>
    </g>
  </g>

  <!-- BOTTOM: Maya at her desk looking up at sky, satisfied -->
  <g>
    <!-- Desk -->
    <line x1="0" y1="510" x2="800" y2="510" stroke="#1e293b" stroke-width="1"/>

    <!-- Maya, head tilted slightly up -->
    <g data-maya="present">
      <rect x="380" y="400" width="40" height="80" fill="#94a3b8" rx="8"/>
      <circle cx="400" cy="395" r="15" fill="#cbd5e1"/>
      <!-- Subtle smile arc -->
      <path d="M 393 398 Q 400 402 407 398" stroke="#22c55e" stroke-width="1.5" fill="none"/>
    </g>

    <!-- The Formalist beside Maya -->
    <g>
      <rect x="490" y="385" width="50" height="100" fill="#475569" rx="10"/>
      <circle cx="515" cy="385" r="18" fill="#94a3b8"/>
      <circle cx="508" cy="385" r="4" fill="#0d1117" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="522" cy="385" r="4" fill="#0d1117" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="512" y1="385" x2="518" y2="385" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Dim tablet -->
      <rect x="500" y="430" width="60" height="40" fill="#1e293b" stroke="#475569" stroke-width="1" rx="2"/>
    </g>

    <!-- Small team visible in background -->
    <g opacity="0.6">
      <circle cx="200" cy="470" r="6" fill="#cbd5e1"/>
      <rect x="194" y="476" width="12" height="20" fill="#94a3b8"/>
      <circle cx="240" cy="470" r="6" fill="#cbd5e1"/>
      <rect x="234" y="476" width="12" height="20" fill="#94a3b8"/>
      <circle cx="280" cy="470" r="6" fill="#cbd5e1"/>
      <rect x="274" y="476" width="12" height="20" fill="#94a3b8"/>

      <circle cx="620" cy="470" r="6" fill="#cbd5e1"/>
      <rect x="614" y="476" width="12" height="20" fill="#94a3b8"/>
      <circle cx="660" cy="470" r="6" fill="#cbd5e1"/>
      <rect x="654" y="476" width="12" height="20" fill="#94a3b8"/>
    </g>
  </g>

  <!-- Caption -->
  <text x="400" y="540" font-size="14" fill="#cbd5e1" text-anchor="middle">Three months later. Zero incidents. Twelve features shipped. Forty-seven verified packets.</text>
  <text x="400" y="565" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="bold">The team builds calmly. The code does what it says.</text>
</svg>