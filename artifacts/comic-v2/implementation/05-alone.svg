<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Background -->
  <rect fill="#0d1117" width="800" height="600"/>

  <!-- Title -->
  <text x="400" y="40" font-size="24" fill="#ef4444" text-anchor="middle" font-weight="bold">How?</text>

  <!-- Dim ambient (almost everything is dark; one small lamp) -->
  <!-- The window from panel 1, but now dark -->
  <rect x="40" y="60" width="220" height="160" fill="#0a0f1a" stroke="#1e293b" stroke-width="2" rx="4"/>
  <!-- Moon, not sun -->
  <circle cx="200" cy="110" r="22" fill="#cbd5e1" opacity="0.4"/>
  <circle x="40" y="60" width="220" height="160" fill="#1e293b" opacity="0.5" rx="4"/>

  <!-- City silhouette inside window -->
  <rect x="60"  y="180" width="18" height="40" fill="#0a0f1a"/>
  <rect x="82"  y="160" width="22" height="60" fill="#0a0f1a"/>
  <rect x="108" y="170" width="16" height="50" fill="#0a0f1a"/>
  <rect x="128" y="150" width="24" height="70" fill="#0a0f1a"/>
  <rect x="156" y="175" width="18" height="45" fill="#0a0f1a"/>
  <rect x="178" y="165" width="20" height="55" fill="#0a0f1a"/>
  <rect x="202" y="180" width="14" height="40" fill="#0a0f1a"/>
  <rect x="220" y="170" width="20" height="50" fill="#0a0f1a"/>

  <!-- Desk surface -->
  <line x1="0" y1="470" x2="800" y2="470" stroke="#1e293b" stroke-width="1"/>

  <!-- Laptop on desk (the same code as panel 1, but now glowing RED) -->
  <rect x="450" y="330" width="220" height="140" fill="#111827" stroke="#1e293b" stroke-width="2" rx="4"/>
  <rect x="462" y="342" width="196" height="116" fill="#1a0a0a"/>
  <text x="468" y="358" font-size="10" fill="#ef4444">const onConfirm = () =&gt; {</text>
  <text x="468" y="372" font-size="10" fill="#ef4444">  setState('confirming');</text>
  <text x="468" y="386" font-size="10" fill="#ef4444">  api.confirm().then(() =&gt; {</text>
  <text x="468" y="400" font-size="10" fill="#ef4444">    setState('closing');</text>
  <text x="468" y="414" font-size="10" fill="#ef4444">  });</text>
  <text x="468" y="428" font-size="10" fill="#ef4444">};</text>
  <text x="468" y="450" font-size="10" fill="#94a3b8">// it looked right.</text>
  <!-- Red glow overlay -->
  <rect x="450" y="330" width="220" height="140" fill="#ef4444" opacity="0.08" rx="4"/>
  <!-- Lamp glow circle -->
  <circle cx="560" cy="400" r="180" fill="#ef4444" opacity="0.04"/>
  <rect x="440" y="468" width="240" height="8" fill="#1e293b" rx="2"/>

  <!-- The single lamp (only light source) -->
  <rect x="700" y="280" width="40" height="6" fill="#1e293b" transform="rotate(-15 720 283)"/>
  <polygon points="700,290 740,290 730,330 710,330" fill="#1e293b"/>
  <ellipse cx="720" cy="340" rx="14" ry="6" fill="#f59e0b" opacity="0.85"/>
  <ellipse cx="720" cy="340" rx="40" ry="20" fill="#f59e0b" opacity="0.06"/>
  <!-- Lamp post -->
  <line x1="720" y1="280" x2="720" y2="468" stroke="#1e293b" stroke-width="2"/>

  <!-- Maya at desk, alone -->
  <g data-maya="present">
    <rect x="320" y="290" width="40" height="80" fill="#94a3b8" rx="8"/>
    <circle cx="340" cy="290" r="15" fill="#cbd5e1"/>
  </g>

  <!-- Empty chair where the Formalist will eventually sit (panel 6) -->
  <g opacity="0.4">
    <!-- Chair seat -->
    <rect x="180" y="400" width="60" height="14" fill="#1e293b" rx="2"/>
    <!-- Chair back -->
    <rect x="180" y="350" width="14" height="50" fill="#1e293b" rx="2"/>
    <rect x="226" y="350" width="14" height="50" fill="#1e293b" rx="2"/>
    <!-- Chair legs -->
    <line x1="190" y1="414" x2="190" y2="468" stroke="#1e293b" stroke-width="2"/>
    <line x1="230" y1="414" x2="230" y2="468" stroke="#1e293b" stroke-width="2"/>
    <!-- Question mark above chair -->
    <text x="210" y="340" font-size="20" fill="#475569" text-anchor="middle">?</text>
  </g>

  <!-- Bug-creature, small, in the corner of the screen, watching -->
  <g>
    <polygon points="640,355 660,355 650,375" fill="#ef4444" stroke="#7f1d1d" stroke-width="1"/>
    <circle cx="645" cy="365" r="2" fill="#0d1117"/>
    <circle cx="655" cy="365" r="2" fill="#0d1117"/>
  </g>

  <!-- Empty coffee cup (no amber; lonely detail) -->
  <rect x="380" y="360" width="22" height="30" fill="#1e293b" rx="2"/>
  <ellipse cx="391" cy="362" rx="10" ry="3" fill="#0d1117"/>

  <!-- Caption -->
  <text x="400" y="540" font-size="14" fill="#cbd5e1" text-anchor="middle">Tuesday, 2:47 AM. The tests passed. The review was clean.</text>
  <text x="400" y="565" font-size="14" fill="#f59e0b" text-anchor="middle" font-style="italic">"How did this get past me?"</text>
</svg>