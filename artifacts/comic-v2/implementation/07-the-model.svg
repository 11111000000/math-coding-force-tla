<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Background -->
  <rect fill="#0d1117" width="800" height="600"/>

  <!-- Title -->
  <text x="400" y="40" font-size="24" fill="#a855f7" text-anchor="middle" font-weight="bold">The Model</text>

  <!-- Desk surface -->
  <line x1="0" y1="490" x2="800" y2="490" stroke="#1e293b" stroke-width="1"/>

  <!-- LEFT monitor: TLA+ code -->
  <rect x="40" y="120" width="320" height="220" fill="#111827" stroke="#1e293b" stroke-width="2" rx="6"/>
  <rect x="50" y="130" width="300" height="200" fill="#0d1117"/>
  <rect x="50" y="130" width="300" height="200" fill="#a855f7" opacity="0.04"/>
  <text x="56" y="148" font-size="9" fill="#94a3b8">---- MODULE Dialog ----</text>
  <text x="56" y="162" font-size="9" fill="#a855f7">VARIABLES state,</text>
  <text x="56" y="174" font-size="9" fill="#a855f7">  pendingResult</text>
  <text x="56" y="190" font-size="9" fill="#cbd5e1">Init == /\ state = "closed"</text>
  <text x="56" y="204" font-size="9" fill="#cbd5e1">        /\ pendingResult = "none"</text>
  <text x="56" y="222" font-size="9" fill="#22c55e">Confirm ==</text>
  <text x="56" y="234" font-size="9" fill="#22c55e">  /\ state = "open"</text>
  <text x="56" y="246" font-size="9" fill="#22c55e">  /\ state&apos; = "confirming"</text>
  <text x="56" y="262" font-size="9" fill="#ef4444">StateInvariant ==</text>
  <text x="56" y="274" font-size="9" fill="#ef4444">  state \in States</text>
  <text x="56" y="290" font-size="9" fill="#cbd5e1">====</text>

  <!-- RIGHT monitor: state diagram -->
  <rect x="440" y="120" width="320" height="220" fill="#111827" stroke="#1e293b" stroke-width="2" rx="6"/>
  <rect x="450" y="130" width="300" height="200" fill="#0d1117"/>
  <!-- States as nodes -->
  <g>
    <circle cx="490" cy="170" r="14" fill="#22c55e"/>
    <text x="490" y="174" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">closed</text>

    <circle cx="600" cy="170" r="14" fill="#22c55e"/>
    <text x="600" y="174" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">open</text>

    <circle cx="710" cy="170" r="14" fill="#22c55e"/>
    <text x="710" y="174" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">conf</text>

    <circle cx="600" cy="270" r="14" fill="#22c55e"/>
    <text x="600" y="274" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">settle</text>

    <circle cx="490" cy="270" r="14" fill="#22c55e"/>
    <text x="490" y="274" font-size="8" fill="#0d1117" text-anchor="middle" font-weight="bold">cancel</text>

    <!-- Transitions (lines) -->
    <line x1="504" y1="170" x2="586" y2="170" stroke="#22c55e" stroke-width="2"/>
    <line x1="614" y1="170" x2="696" y2="170" stroke="#22c55e" stroke-width="2"/>
    <line x1="600" y1="184" x2="600" y2="256" stroke="#22c55e" stroke-width="2"/>
    <line x1="490" y1="184" x2="490" y2="256" stroke="#22c55e" stroke-width="2"/>
    <line x1="586" y1="270" x2="504" y2="270" stroke="#22c55e" stroke-width="2"/>

    <!-- Closed loop label -->
    <text x="545" y="200" font-size="9" fill="#22c55e" text-anchor="middle">Open</text>
    <text x="655" y="200" font-size="9" fill="#22c55e" text-anchor="middle">Confirm</text>
    <text x="620" y="230" font-size="9" fill="#22c55e">Resolve</text>
    <text x="450" y="230" font-size="9" fill="#22c55e" text-anchor="middle">Dismiss</text>
    <text x="545" y="295" font-size="9" fill="#22c55e" text-anchor="middle">FinishClose</text>
  </g>

  <!-- Maya lit by both purples (light reflected from screens) -->
  <g data-maya="present">
    <rect x="370" y="370" width="40" height="80" fill="#94a3b8" rx="8"/>
    <circle cx="390" cy="370" r="15" fill="#cbd5e1"/>
  </g>
  <circle cx="200" cy="220" r="120" fill="#a855f7" opacity="0.05"/>
  <circle cx="600" cy="220" r="120" fill="#a855f7" opacity="0.05"/>

  <!-- Bug is invisible — hiding in the model -->
  <!-- Hint: a single very faint red pixel somewhere subtle -->
  <g opacity="0.25">
    <polygon points="710,210 720,210 715,220" fill="#ef4444"/>
  </g>

  <!-- Caption -->
  <text x="400" y="540" font-size="14" fill="#cbd5e1" text-anchor="middle">Maya writes 47 lines of TLA+. The states are clear. The bug is invisible.</text>
  <text x="400" y="565" font-size="14" fill="#f59e0b" text-anchor="middle" font-style="italic">"If state is 'confirming', the user can't click again... right?"</text>
</svg>
