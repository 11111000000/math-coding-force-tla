<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Background -->
  <rect fill="#0d1117" width="800" height="600"/>

  <!-- Title -->
  <text x="400" y="40" font-size="24" fill="#a855f7" text-anchor="middle" font-weight="bold">The Mentor</text>

  <!-- Faint constellation lines foreshadowing the state machine -->
  <g opacity="0.35">
    <line x1="120" y1="180" x2="280" y2="140" stroke="#22c55e" stroke-width="2"/>
    <line x1="280" y1="140" x2="450" y2="200" stroke="#22c55e" stroke-width="2"/>
    <line x1="450" y1="200" x2="620" y2="160" stroke="#22c55e" stroke-width="2"/>
    <line x1="620" y1="160" x2="700" y2="260" stroke="#22c55e" stroke-width="2"/>
    <line x1="120" y1="180" x2="200" y2="320" stroke="#22c55e" stroke-width="2"/>
    <line x1="200" y1="320" x2="450" y2="200" stroke="#22c55e" stroke-width="2"/>

    <circle cx="120" cy="180" r="10" fill="#22c55e"/>
    <circle cx="280" cy="140" r="10" fill="#22c55e"/>
    <circle cx="450" cy="200" r="10" fill="#22c55e"/>
    <circle cx="620" cy="160" r="10" fill="#22c55e"/>
    <circle cx="700" cy="260" r="10" fill="#22c55e"/>
    <circle cx="200" cy="320" r="10" fill="#22c55e"/>

    <text x="120" y="166" font-size="9" fill="#22c55e" text-anchor="middle">closed</text>
    <text x="280" y="126" font-size="9" fill="#22c55e" text-anchor="middle">open</text>
    <text x="450" y="186" font-size="9" fill="#22c55e" text-anchor="middle">confirm</text>
    <text x="620" y="146" font-size="9" fill="#22c55e" text-anchor="middle">settle</text>
    <text x="700" y="246" font-size="9" fill="#22c55e" text-anchor="middle">error</text>
  </g>

  <!-- The Formalist on the LEFT (taller) -->
  <g>
    <!-- Body: 50x100 darker slate -->
    <rect x="160" y="200" width="50" height="100" fill="#475569" rx="10"/>
    <!-- Head -->
    <circle cx="185" cy="200" r="18" fill="#94a3b8"/>
    <!-- Glasses (two small white circles connected) -->
    <circle cx="178" cy="200" r="4" fill="#0d1117" stroke="#cbd5e1" stroke-width="1"/>
    <circle cx="192" cy="200" r="4" fill="#0d1117" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="182" y1="200" x2="188" y2="200" stroke="#cbd5e1" stroke-width="1"/>
  </g>

  <!-- Tablet the Formalist holds, glowing purple -->
  <rect x="135" y="240" width="100" height="70" fill="#1e0a2e" stroke="#a855f7" stroke-width="2" rx="4"/>
  <rect x="135" y="240" width="100" height="70" fill="#a855f7" opacity="0.12" rx="4"/>
  <text x="142" y="258" font-size="9" fill="#a855f7">VARIABLES state,</text>
  <text x="142" y="270" font-size="9" fill="#a855f7">  pendingResult</text>
  <text x="142" y="284" font-size="9" fill="#a855f7">Init == /\ state =</text>
  <text x="142" y="296" font-size="9" fill="#a855f7">  "closed"</text>

  <!-- Speech bubble from Formalist -->
  <g>
    <path d="M 230 130 L 340 110 L 360 90 L 350 145 L 270 155 Z" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="295" y="125" font-size="11" fill="#f59e0b" text-anchor="middle">You can prove</text>
    <text x="295" y="140" font-size="11" fill="#f59e0b" text-anchor="middle">this never happens.</text>
  </g>

  <!-- Maya on the RIGHT, leaning forward (purple light catching her) -->
  <g data-maya="present">
    <!-- Body slightly tilted forward -->
    <rect x="540" y="220" width="40" height="80" fill="#94a3b8" rx="8" transform="rotate(-8 560 260)"/>
    <circle cx="555" cy="220" r="15" fill="#cbd5e1" transform="rotate(-8 560 230)"/>
  </g>
  <!-- Purple glow on Maya's side -->
  <circle cx="600" cy="260" r="140" fill="#a855f7" opacity="0.06"/>

  <!-- Bug-creature in background, small, dim -->
  <g opacity="0.4">
    <polygon points="380,420 400,420 390,440" fill="#ef4444"/>
    <circle cx="385" cy="430" r="1.5" fill="#0d1117"/>
    <circle cx="395" cy="430" r="1.5" fill="#0d1117"/>
  </g>

  <!-- Caption -->
  <text x="400" y="540" font-size="14" fill="#cbd5e1" text-anchor="middle">Tuesday, 11:14 AM. A colleague shows Maya something she has not seen before.</text>
  <text x="400" y="565" font-size="14" fill="#a855f7" text-anchor="middle" font-style="italic">"Seven stages. Each one turns assumption into evidence."</text>
</svg>